<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRONCORE GYM | Authentication Preview</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap');
        
        body { background-color: #0A0A0A; margin: 0; color: #F5F5F0; }
        input::placeholder { color: #52525B; opacity: 0.5; font-style: italic; font-size: 14px; }
        input:focus::placeholder { opacity: 0.2; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #1C1C1C; border: 1px solid #C9A84C; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [activeTab, setActiveTab] = useState('login');
          const [loading, setLoading] = useState(false);
          const [showPassword, setShowPassword] = useState(false);

          const handleAuth = (e) => {
            e.preventDefault();
            setLoading(true);
            setTimeout(() => {
              setLoading(false);
              alert(activeTab === 'login' ? 'Đăng nhập thành công!' : 'Đăng ký thành công!');
            }, 1500);
          };

          return (
            <div className="min-h-screen flex items-center justify-center relative overflow-hidden font-['Cormorant_Garamond']">
              {/* Decorative Blur */}
              <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#C9A84C] opacity-5 blur-[120px] rounded-full"></div>
              <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#C9A84C] opacity-5 blur-[120px] rounded-full"></div>

              <div className="container mx-auto px-4 z-10 flex flex-col items-center">
                
                <div className="mb-8 text-center">
                  <h1 className="font-['Bebas_Neue'] text-5xl tracking-[4px] text-[#C9A84C]">IRONCORE</h1>
                  <p className="uppercase tracking-[2px] text-xs text-[#A1A1AA] mt-1 font-['Bebas_Neue']">Forge Your Legacy</p>
                </div>

                <div className="w-full max-w-md bg-[#1C1C1C] border border-white/5 rounded-2xl overflow-hidden shadow-2xl relative">
                  <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#C9A84C] to-transparent"></div>

                  <div className="flex border-b border-white/5">
                    <button onClick={() => setActiveTab('login')} className={`flex-1 py-5 font-['Bebas_Neue'] text-lg tracking-widest transition-all ${activeTab === 'login' ? 'text-[#C9A84C] bg-white/[0.02]' : 'text-[#A1A1AA] hover:text-[#F5F5F0]'}`}>LOGIN</button>
                    <button onClick={() => setActiveTab('register')} className={`flex-1 py-5 font-['Bebas_Neue'] text-lg tracking-widest transition-all ${activeTab === 'register' ? 'text-[#C9A84C] bg-white/[0.02]' : 'text-[#A1A1AA] hover:text-[#F5F5F0]'}`}>REGISTER</button>
                  </div>

                  <div className="p-8 md:p-10">
                    <form onSubmit={handleAuth} className="space-y-6">
                      {activeTab === 'register' && (
                        <div className="space-y-1 group">
                          <label className="text-xs uppercase tracking-widest text-[#A1A1AA] font-['Bebas_Neue'] group-focus-within:text-[#C9A84C]">Full Name</label>
                          <div className="relative">
                            <span className="absolute left-0 top-1/2 -translate-y-1/2 text-[#A1A1AA]"><i className="far fa-user text-sm"></i></span>
                            <input type="text" placeholder="Nguyen Van A" className="w-full bg-transparent border-b border-white/10 py-3 pl-8 outline-none focus:border-[#C9A84C] transition-all text-lg" required />
                          </div>
                        </div>
                      )}

                      <div className="space-y-1 group">
                        <label className="text-xs uppercase tracking-widest text-[#A1A1AA] font-['Bebas_Neue'] group-focus-within:text-[#C9A84C]">Email Address</label>
                        <div className="relative">
                          <span className="absolute left-0 top-1/2 -translate-y-1/2 text-[#A1A1AA]"><i className="far fa-envelope text-sm"></i></span>
                          <input type="email" placeholder="gym@ironcore.vn" className="w-full bg-transparent border-b border-white/10 py-3 pl-8 outline-none focus:border-[#C9A84C] transition-all text-lg" required />
                        </div>
                      </div>

                      {activeTab === 'register' && (
                        <div className="space-y-1 group">
                          <label className="text-xs uppercase tracking-widest text-[#A1A1AA] font-['Bebas_Neue'] group-focus-within:text-[#C9A84C]">Phone Number</label>
                          <div className="relative">
                            <span className="absolute left-0 top-1/2 -translate-y-1/2 text-[#A1A1AA]"><i className="fas fa-phone-alt text-sm"></i></span>
                            <input type="tel" placeholder="09xx xxx xxx" className="w-full bg-transparent border-b border-white/10 py-3 pl-8 outline-none focus:border-[#C9A84C] transition-all text-lg" required />
                          </div>
                        </div>
                      )}

                      <div className="space-y-1 group">
                        <div className="flex justify-between items-center">
                          <label className="text-xs uppercase tracking-widest text-[#A1A1AA] font-['Bebas_Neue'] group-focus-within:text-[#C9A84C]">Password</label>
                          {activeTab === 'login' && <a href="#" className="text-[10px] uppercase tracking-widest text-[#C9A84C] font-bold">Forgot?</a>}
                        </div>
                        <div className="relative">
                          <span className="absolute left-0 top-1/2 -translate-y-1/2 text-[#A1A1AA]"><i className="fas fa-lock text-sm"></i></span>
                          <input type={showPassword ? "text" : "password"} placeholder="••••••••" className="w-full bg-transparent border-b border-white/10 py-3 px-8 outline-none focus:border-[#C9A84C] transition-all text-lg tracking-widest" required />
                          <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-0 top-1/2 -translate-y-1/2 text-[#A1A1AA] hover:text-[#C9A84C]"><i className={`far ${showPassword ? 'fa-eye-slash' : 'fa-eye'} text-sm`}></i></button>
                        </div>
                      </div>

                      <button type="submit" disabled={loading} className="w-full py-4 bg-[#C9A84C] hover:bg-[#E5C76B] text-[#0A0A0A] font-['Bebas_Neue'] text-xl tracking-[2px] transition-all flex items-center justify-center space-x-2 shadow-[0_10px_30px_rgba(201,168,76,0.2)]">
                        {loading ? <i className="fas fa-spinner fa-spin"></i> : <><span className="mt-1">{activeTab === 'login' ? 'SIGN IN' : 'CREATE ACCOUNT'}</span><i className="fas fa-arrow-right text-sm"></i></>}
                      </button>

                      <div className="relative py-4">
                        <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-white/5"></div></div>
                        <div className="relative flex justify-center text-[10px] uppercase tracking-widest"><span className="bg-[#1C1C1C] px-4 text-[#A1A1AA]">OR CONTINUE WITH</span></div>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <button type="button" className="py-3 border border-white/5 rounded-lg text-sm hover:bg-white/[0.03] transition-all flex items-center justify-center space-x-2">
                          <i className="fab fa-google text-xs text-[#C9A84C]"></i><span className="font-['Bebas_Neue'] tracking-wider mt-1">GOOGLE</span>
                        </button>
                        <button type="button" className="py-3 border border-white/5 rounded-lg text-sm hover:bg-white/[0.03] transition-all flex items-center justify-center space-x-2">
                          <i className="fab fa-apple text-xs text-[#C9A84C]"></i><span className="font-['Bebas_Neue'] tracking-wider mt-1">APPLE</span>
                        </button>
                      </div>
                    </form>
                  </div>

                  <div className="p-6 bg-black/20 text-center border-t border-white/5">
                    <p className="text-xs text-[#A1A1AA]">{activeTab === 'login' ? "Don't have an account?" : "Already have an account?"} <button onClick={() => setActiveTab(activeTab === 'login' ? 'register' : 'login')} className="text-[#C9A84C] ml-1 font-bold uppercase tracking-wider hover:underline">{activeTab === 'login' ? "Register Now" : "Sign In"}</button></p>
                  </div>
                </div>

                <a href="/" className="mt-8 text-[#A1A1AA] hover:text-[#C9A84C] transition-all text-xs uppercase tracking-[2px] flex items-center space-x-2"><i className="fas fa-chevron-left text-[10px]"></i><span>Back to Landing</span></a>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
