<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - NQT Gym Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nqt-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .nqt-sidebar-item:hover, .nqt-sidebar-item.active {
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-[#E2E8F0] flex flex-col fixed h-full z-20">
        <div class="p-6 flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-dumbbell text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-[#0F172A]">NQT <span class="text-blue-600">Gym</span></span>
        </div>

        <nav class="flex-1 px-4 py-4 space-y-1">
            <a href="/admin/dashboard" id="nav-dashboard" class="nqt-sidebar-item flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B]">
                <i class="fas fa-chart-line w-5"></i>
                <span class="font-medium">Tổng quan</span>
            </a>
            <a href="/admin/hoi-vien" id="nav-hoi-vien" class="nqt-sidebar-item flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B]">
                <i class="fas fa-users w-5"></i>
                <span class="font-medium">Hội viên</span>
            </a>
            <a href="/admin/goi-tap" id="nav-goi-tap" class="nqt-sidebar-item flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B]">
                <i class="fas fa-tags w-5"></i>
                <span class="font-medium">Gói tập</span>
            </a>
            <a href="#" class="nqt-sidebar-item flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B]">
                <i class="fas fa-store w-5"></i>
                <span class="font-medium">Chi nhánh</span>
            </a>
            <div class="pt-6 pb-2 px-4 text-xs font-semibold text-[#94A3B8] uppercase tracking-wider">Hệ thống</div>
            <a href="#" class="nqt-sidebar-item flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 text-[#64748B]">
                <i class="fas fa-cog w-5"></i>
                <span class="font-medium">Cấu hình</span>
            </a>
        </nav>

        <div class="p-4 border-t border-[#E2E8F0]">
            <button onclick="nqtLogout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-red-600 hover:bg-red-50 transition-all duration-200">
                <i class="fas fa-sign-out-alt w-5"></i>
                <span class="font-medium">Đăng xuất</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 min-h-screen flex flex-col">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-[#E2E8F0] flex items-center justify-between px-8 sticky top-0 z-10">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-semibold text-[#0F172A]">{% block title %}Dashboard{% endblock %}</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex flex-col items-end">
                    <span id="nqt-user-name" class="text-sm font-semibold text-[#0F172A]">...</span>
                    <span id="nqt-user-role" class="text-xs text-[#64748B]">Admin</span>
                </div>
                <div class="w-10 h-10 bg-gray-100 rounded-full border border-gray-200 flex items-center justify-center">
                    <i class="fas fa-user-circle text-2xl text-gray-400"></i>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-8 flex-1">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Global JS Utils -->
    <script>
        // API Wrapper
        const nqtApi = {
            async fetch(url, options = {}) {
                const token = localStorage.getItem('nqt_token');
                if (!options.headers) options.headers = {};
                if (token) {
                    options.headers['Authorization'] = `Bearer ${token}`;
                }
                if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(options.body);
                }

                try {
                    const response = await fetch(url, options);
                    const data = await response.json();
                    
                    if (response.status === 401) {
                        localStorage.removeItem('nqt_token');
                        window.location.href = '/admin/login';
                        return null;
                    }
                    
                    return data;
                } catch (error) {
                    console.error('API Error:', error);
                    return { nqt_thanh_cong: false, nqt_thong_diep: 'Lỗi kết nối máy chủ' };
                }
            }
        };

        function nqtLogout() {
            localStorage.removeItem('nqt_token');
            window.location.href = '/admin/login';
        }

        // Check Login Status
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('nqt_token');
            if (!token && window.location.pathname !== '/admin/login') {
                window.location.href = '/admin/login';
            }
            
            // Highlight active nav
            const path = window.location.pathname;
            document.querySelectorAll('.nqt-sidebar-item').forEach(item => {
                if (item.getAttribute('href') === path) {
                    item.classList.add('active');
                }
            });

            // Load user info from token (optional claim)
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('nqt-user-name').textContent = payload.nqt_ho_ten || 'User';
                document.getElementById('nqt-user-role').textContent = payload.nqt_vai_tro?.[0] || 'Member';
            } catch(e) {}
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
