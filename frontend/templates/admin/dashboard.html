{% extends "admin/base_nqt.html" %}

{% block title %}Tổng quan{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
{% include "admin/_dashboard_content.html" %}
{% endblock %}

{% block scripts %}
<script>
(function() {
    // Live clock
    function nqtUpdateClock() {
        const now = new Date();
        const timeEl = document.getElementById('nqtCurrentTime');
        const dayEl = document.getElementById('nqtDayOfWeek');
        if (timeEl) timeEl.textContent = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        if (dayEl) {
            const days = ['Chủ nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            dayEl.textContent = days[now.getDay()];
        }
    }
    setInterval(nqtUpdateClock, 1000);

    function nqtSetGreeting() {
        const hour = new Date().getHours();
        let greeting = 'Xin chào';
        if (hour >= 5 && hour < 12) greeting = 'Chào buổi sáng';
        else if (hour >= 12 && hour < 18) greeting = 'Chào buổi chiều';
        else if (hour >= 18 && hour < 22) greeting = 'Chào buổi tối';
        else greeting = 'Làm việc khuya';
        const greetingEl = document.getElementById('nqtGreeting');
        if (greetingEl) greetingEl.textContent = greeting;
        const dateEl = document.getElementById('nqtCurrentDate');
        if (dateEl) dateEl.textContent = new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        try {
            const token = localStorage.getItem('nqt_token');
            if (token) {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const nameEl = document.getElementById('nqtUserNameWelcome');
                if (nameEl) nameEl.textContent = payload.g6_ho_ten || 'Admin';
            }
        } catch(e) {}
    }

    function nqtFormatCurrency(amount) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(amount);
    }

    async function nqtLoadStats() {
        const data = await nqtApi.fetch('/api/nqt-thong-ke-dashboard');
        if (data && data.nqt_thanh_cong) {
            const s = data.nqt_du_lieu;
            const el = (id) => document.getElementById(id);
            if (el('nqtStatTongHoiVien')) el('nqtStatTongHoiVien').textContent = (s.g6_tong_hoi_vien || 0).toLocaleString('vi-VN');
            if (el('nqtStatDangTap')) el('nqtStatDangTap').textContent = s.g6_dang_tap_luyen || 0;
            if (el('nqtStatSapHetHan')) el('nqtStatSapHetHan').textContent = s.g6_sap_het_han || 0;
            if (el('nqtStatCheckinHomNay')) el('nqtStatCheckinHomNay').textContent = s.g6_checkin_hom_nay || 0;
            if (el('nqtStatDoanhThu')) el('nqtStatDoanhThu').textContent = nqtFormatCurrency(s.g6_doanh_thu_thang || 0);
            if (el('nqtBadgeHvMoi')) el('nqtBadgeHvMoi').textContent = `+${s.g6_hoi_vien_moi_thang || 0} mới`;
            const capacityPercent = el('nqtCapacityPercent');
            if (capacityPercent) {
                const capacity = Math.min(100, Math.round(((s.g6_dang_tap_luyen || 0) / (s.g6_suc_chua || 100)) * 100));
                capacityPercent.textContent = capacity;
            }
        }

        const chiNhanhData = await nqtApi.fetch('/api/nqt-chi-nhanh');
        if (chiNhanhData && chiNhanhData.nqt_thanh_cong) {
            const el = document.getElementById('nqtStatChiNhanh');
            if (el) el.textContent = chiNhanhData.nqt_du_lieu.length || 0;
            const cityEl = document.getElementById('nqtChiNhanhThanhPho');
            if (cityEl) {
                const cities = new Set(chiNhanhData.nqt_du_lieu.map(c => c.g6_thanh_pho).filter(Boolean));
                cityEl.textContent = `(${cities.size} thành phố)`;
            }
        }

        const goiTapData = await nqtApi.fetch('/api/nqt-goi-tap');
        if (goiTapData && goiTapData.nqt_thanh_cong) {
            const el = document.getElementById('nqtStatGoiTap');
            if (el) el.textContent = goiTapData.nqt_du_lieu.length || 0;
            const noiBat = goiTapData.nqt_du_lieu.filter(g => g.g6_la_noi_bat).length;
            const noiBatEl = document.getElementById('nqtGoiNoiBat');
            if (noiBatEl) noiBatEl.textContent = `(${noiBat} nổi bật)`;
        }

        nqtLoadRecentActivity();
    }

    async function nqtLoadRecentActivity() {
        const activityEl = document.getElementById('nqtRecentActivity');
        if (!activityEl) return;
        const activities = [
            { icon: 'fa-user-plus', title: 'Hội viên mới đăng ký', time: '2 phút trước' },
            { icon: 'fa-check-circle', title: 'Check-in thành công', time: '5 phút trước' },
            { icon: 'fa-credit-card', title: 'Thanh toán gói VIP', time: '15 phút trước' },
            { icon: 'fa-shopping-bag', title: 'Đơn hàng mới #1234', time: '32 phút trước' },
        ];
        activityEl.innerHTML = activities.map(a => `
            <div class="p-3 flex items-center space-x-3 hover:bg-[#f5f5f5] dark:hover:bg-[#333] transition-colors cursor-pointer">
                <div class="w-8 h-8 bg-[#f5f5f5] dark:bg-[#404040] rounded-md flex items-center justify-center flex-shrink-0">
                    <i class="fas ${a.icon} text-xs text-[#525252] dark:text-[#a3a3a3]"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm text-[#191919] dark:text-[#fafafa] truncate">${a.title}</p>
                    <p class="text-xs text-[#666] dark:text-[#888]">${a.time}</p>
                </div>
            </div>
        `).join('');
    }

    // ========== CHART.JS REAL CHART ==========
    let nqtChartInstance = null;

    function nqtGetChartColors() {
        const isDark = document.documentElement.classList.contains('dark');
        return {
            line: isDark ? '#fafafa' : '#191919',
            fill: isDark ? 'rgba(250,250,250,0.08)' : 'rgba(25,25,25,0.06)',
            grid: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)',
            text: isDark ? '#666' : '#a3a3a3',
            point: isDark ? '#fafafa' : '#191919',
        };
    }

    function nqtTaoChartData(soNgay) {
        // Placeholder tĩnh (không random) khi API fail
        const nqtLabels = [], nqtValues = [];
        const now = new Date();
        for (let i = soNgay - 1; i >= 0; i--) {
            const d = new Date(now);
            d.setDate(d.getDate() - i);
            if (soNgay <= 7) {
                const nqtDays = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
                nqtLabels.push(nqtDays[d.getDay()]);
            } else if (soNgay <= 30) {
                nqtLabels.push(`${d.getDate()}/${d.getMonth()+1}`);
            } else {
                nqtLabels.push(`T${Math.ceil((soNgay - i) / 7)}`);
            }
            nqtValues.push(0);
        }
        return { nqtLabels, nqtValues };
    }

    async function nqtVeChart(soNgay = 7) {
        const canvas = document.getElementById('nqtChartDoanhThu');
        if (!canvas) return;
        if (typeof Chart === 'undefined') return;
        const ctx = canvas.getContext('2d');
        const colors = nqtGetChartColors();

        // Thử lấy data từ API, nếu không có thì dùng placeholder
        let nqtLabels, nqtValues;
        try {
            const res = await nqtApi.fetch(`/api/nqt-thong-ke-bieu-do?g6_so_ngay=${soNgay}`);
            if (res?.nqt_thanh_cong && res.nqt_du_lieu?.g6_nhan) {
                nqtLabels = res.nqt_du_lieu.g6_nhan;
                nqtValues = res.nqt_du_lieu.g6_gia_tri;
            } else { throw new Error('no data'); }
        } catch {
            const fallback = nqtTaoChartData(soNgay);
            nqtLabels = fallback.nqtLabels;
            nqtValues = fallback.nqtValues;
        }

        if (nqtChartInstance) nqtChartInstance.destroy();

        nqtChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: nqtLabels,
                datasets: [{
                    label: 'Hội viên mới',
                    data: nqtValues,
                    borderColor: colors.line,
                    backgroundColor: colors.fill,
                    borderWidth: 1.5,
                    pointBackgroundColor: colors.point,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    fill: true,
                    tension: 0.4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => ` ${ctx.parsed.y} hội viên`
                        },
                        backgroundColor: document.documentElement.classList.contains('dark') ? '#262626' : '#191919',
                        titleColor: '#fafafa',
                        bodyColor: '#a3a3a3',
                        borderColor: document.documentElement.classList.contains('dark') ? '#404040' : '#333',
                        borderWidth: 1,
                        padding: 10,
                        cornerRadius: 6,
                    }
                },
                scales: {
                    x: {
                        grid: { color: colors.grid },
                        ticks: { color: colors.text, font: { size: 11, family: 'Inter' } },
                        border: { display: false }
                    },
                    y: {
                        grid: { color: colors.grid },
                        ticks: { color: colors.text, font: { size: 11, family: 'Inter' }, stepSize: 1 },
                        border: { display: false },
                        beginAtZero: true,
                    }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        });
    }

    window.nqtNavigateTo = function(page, title) {
        if (page && page.startsWith('/')) {
            nqtLoadPage(page, title || 'Admin', true);
        } else {
            const link = document.querySelector(`[data-page="${page}"]`);
            if (link) link.click();
        }
    };

    window.nqtOpenCheckinModal = function() {
        if (typeof nqtToast === 'function') nqtToast('Tính năng Check-in QR đang phát triển', 'info');
    };

    nqtSetGreeting();
    nqtUpdateClock();
    nqtLoadStats();

    // Đợi Chart.js load xong (có thể được inject async qua SPA) rồi mới vẽ
    function nqtWaitChart(nqtRetry) {
        if (typeof Chart !== 'undefined') {
            nqtVeChart(7);
        } else if (nqtRetry > 0) {
            setTimeout(() => nqtWaitChart(nqtRetry - 1), 100);
        }
    }
    nqtWaitChart(30); // thử tối đa 3 giây

    // Chart period switcher
    document.querySelectorAll('.nqt-chart-period').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nqt-chart-period').forEach(b => {
                b.classList.remove('text-[#191919]', 'dark:text-[#fafafa]', 'bg-[#f5f5f5]', 'dark:bg-[#404040]', 'font-medium');
                b.classList.add('text-[#666]', 'dark:text-[#888]');
            });
            btn.classList.add('text-[#191919]', 'dark:text-[#fafafa]', 'bg-[#f5f5f5]', 'dark:bg-[#404040]', 'font-medium');
            btn.classList.remove('text-[#666]', 'dark:text-[#888]');
            nqtVeChart(parseInt(btn.dataset.period));
        });
    });

    // Re-render chart when dark mode changes
    const nqtDarkBtn = document.getElementById('nqtDarkModeBtn');
    if (nqtDarkBtn) {
        nqtDarkBtn.addEventListener('click', () => {
            setTimeout(() => {
                const activePeriod = document.querySelector('.nqt-chart-period.font-medium');
                nqtVeChart(parseInt(activePeriod?.dataset.period || '7'));
            }, 50);
        });
    }
})();
</script>
{% endblock %}
