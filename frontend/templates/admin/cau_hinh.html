{% extends "admin/base_nqt.html" %}

{% block title %}Cấu hình hệ thống{% endblock %}

{% block content %}
<div class="space-y-4">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-lg font-semibold text-[#191919] dark:text-[#fafafa]">Cấu hình hệ thống</h1>
            <p class="text-sm text-[#666] dark:text-[#888]">Quản lý tất cả cài đặt của hệ thống NQT Gym</p>
        </div>
        <div class="flex items-center space-x-2 px-3 py-1.5 bg-[#dcfce7] dark:bg-[#166534]/20 rounded-md">
            <span class="w-2 h-2 bg-[#16a34a] rounded-full animate-pulse"></span>
            <span class="text-xs font-medium text-[#16a34a]">Hệ thống hoạt động</span>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md p-1.5">
        <div class="flex flex-wrap gap-1" id="nqtTabBar">
            <button data-tab="website" onclick="nqtSwitchTab('website')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-globe text-xs"></i><span>Website</span>
            </button>
            <button data-tab="business" onclick="nqtSwitchTab('business')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-dumbbell text-xs"></i><span>Kinh doanh</span>
            </button>
            <button data-tab="email" onclick="nqtSwitchTab('email')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-envelope text-xs"></i><span>Email SMTP</span>
            </button>
            <button data-tab="payment" onclick="nqtSwitchTab('payment')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-credit-card text-xs"></i><span>Thanh toán</span>
            </button>
            <button data-tab="security" onclick="nqtSwitchTab('security')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-shield-alt text-xs"></i><span>Bảo mật</span>
            </button>
            <button data-tab="loyalty" onclick="nqtSwitchTab('loyalty')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-star text-xs"></i><span>Tích điểm</span>
            </button>
            <button data-tab="theme" onclick="nqtSwitchTab('theme')" class="nqt-tab-pill px-3 py-2 rounded-md text-sm font-medium text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333] flex items-center space-x-2">
                <i class="fas fa-palette text-xs"></i><span>Giao diện</span>
            </button>
        </div>
    </div>

    <!-- Tab Content -->
    <div id="nqtTabContent">
        <div class="flex items-center justify-center py-16 text-[#666] dark:text-[#888]">
            <div class="text-center">
                <i class="fas fa-circle-notch fa-spin text-2xl text-[#191919] dark:text-[#fafafa] mb-3"></i>
                <p class="text-sm">Đang tải cấu hình...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    let nqtCauHinhData = {};
    let nqtActiveTab = localStorage.getItem('nqt_cau_hinh_tab') || 'website';

    const nqtTabDefs = {
        website: {
            label: 'Thông tin Website',
            description: 'Cấu hình thông tin cơ bản hiển thị trên website',
            icon: 'fas fa-globe',
            groups: [
                {
                    title: 'Thông tin cơ bản',
                    description: 'Tên và mô tả website',
                    fields: [
                        { key: 'ten_website', label: 'Tên website', type: 'text', placeholder: 'VD: NQT Gym', hint: 'Hiển thị trên tiêu đề trang' },
                        { key: 'mo_ta_website', label: 'Mô tả ngắn', type: 'textarea', placeholder: 'Mô tả về gym của bạn...', hint: 'SEO meta description' },
                    ]
                },
                {
                    title: 'Hình ảnh thương hiệu',
                    description: 'Logo và favicon',
                    fields: [
                        { key: 'logo_url', label: 'Logo website', type: 'image', hint: 'Khuyến nghị: 200x60px, PNG/SVG' },
                        { key: 'favicon_url', label: 'Favicon', type: 'image', hint: 'Khuyến nghị: 32x32px, ICO/PNG' },
                    ]
                },
                {
                    title: 'Thông tin liên hệ',
                    description: 'Hiển thị ở footer và trang liên hệ',
                    fields: [
                        { key: 'email_lien_he', label: 'Email liên hệ', type: 'email', placeholder: 'contact@example.com' },
                        { key: 'so_dien_thoai_hotline', label: 'Hotline', type: 'text', placeholder: '1900 1234' },
                        { key: 'dia_chi_tru_so', label: 'Địa chỉ trụ sở', type: 'text', placeholder: '123 Đường ABC, Quận XYZ' },
                    ]
                },
                {
                    title: 'Mạng xã hội',
                    description: 'Liên kết đến các trang mạng xã hội',
                    fields: [
                        { key: 'facebook_url', label: 'Facebook', type: 'text', placeholder: 'https://facebook.com/...' },
                        { key: 'zalo_url', label: 'Zalo', type: 'text', placeholder: 'https://zalo.me/...' },
                    ]
                }
            ]
        },
        business: {
            label: 'Cài đặt Kinh doanh',
            description: 'Cấu hình giờ hoạt động, check-in và các quy tắc nghiệp vụ',
            icon: 'fas fa-dumbbell',
            groups: [
                {
                    title: 'Giờ hoạt động',
                    description: 'Giờ mở cửa và đóng cửa mặc định',
                    fields: [
                        { key: 'gio_mo_cua', label: 'Giờ mở cửa', type: 'time' },
                        { key: 'gio_dong_cua', label: 'Giờ đóng cửa', type: 'time' },
                    ]
                },
                {
                    title: 'Quy tắc Check-in',
                    description: 'Cấu hình điểm danh hội viên',
                    fields: [
                        { key: 'so_luot_checkin_ngay_mac_dinh', label: 'Lượt check-in/ngày', type: 'number', hint: 'Số lần được check-in mỗi ngày' },
                        { key: 'cho_phep_checkin_truoc_phut', label: 'Check-in sớm (phút)', type: 'number', hint: 'Cho phép check-in trước buổi tập' },
                        { key: 'suc_chua_mac_dinh', label: 'Sức chứa mặc định', type: 'number', hint: 'Số người tối đa mỗi chi nhánh' },
                    ]
                },
                {
                    title: 'Nhắc nhở hết hạn',
                    description: 'Thông báo trước khi gói tập hết hạn',
                    fields: [
                        { key: 'so_ngay_nhac_het_han', label: 'Nhắc lần 1 (ngày)', type: 'number', hint: 'Số ngày trước khi hết hạn' },
                        { key: 'so_ngay_nhac_lan_2', label: 'Nhắc lần 2 (ngày)', type: 'number', hint: 'Nhắc lại lần 2' },
                    ]
                }
            ]
        },
        email: {
            label: 'Cấu hình Email SMTP',
            description: 'Thiết lập máy chủ gửi email cho hệ thống',
            icon: 'fas fa-envelope',
            groups: [
                {
                    title: 'Máy chủ SMTP',
                    description: 'Cấu hình kết nối đến mail server',
                    fields: [
                        { key: 'smtp_host', label: 'SMTP Host', type: 'text', placeholder: 'smtp.gmail.com', hint: 'Địa chỉ máy chủ SMTP' },
                        { key: 'smtp_port', label: 'SMTP Port', type: 'number', placeholder: '587', hint: '587 (TLS) hoặc 465 (SSL)' },
                        { key: 'smtp_bao_mat', label: 'Bảo mật', type: 'select', options: [
                            { value: 'none', label: 'Không bảo mật' },
                            { value: 'ssl', label: 'SSL (Port 465)' },
                            { value: 'tls', label: 'TLS/STARTTLS (Port 587)' },
                        ], hint: 'Phương thức mã hóa kết nối' },
                    ]
                },
                {
                    title: 'Xác thực SMTP',
                    description: 'Thông tin đăng nhập email gửi đi',
                    fields: [
                        { key: 'smtp_email', label: 'Email đăng nhập', type: 'email', placeholder: 'your-email@gmail.com', hint: 'Email dùng để đăng nhập SMTP' },
                        { key: 'smtp_mat_khau', label: 'Mật khẩu ứng dụng', type: 'password', placeholder: '••••••••••••', hint: 'Với Gmail: dùng App Password' },
                    ]
                },
                {
                    title: 'Thông tin người gửi',
                    description: 'Hiển thị khi gửi email đến khách hàng',
                    fields: [
                        { key: 'email_gui_tu', label: 'Email hiển thị (From)', type: 'email', placeholder: 'no-reply@example.com' },
                        { key: 'ten_nguoi_gui_email', label: 'Tên hiển thị', type: 'text', placeholder: 'NQT Gym' },
                    ]
                }
            ],
            actions: [
                { id: 'testEmail', label: 'Gửi email test', icon: 'fas fa-paper-plane' }
            ]
        },
        security: {
            label: 'Bảo mật',
            description: 'Cấu hình xác thực và bảo vệ tài khoản',
            icon: 'fas fa-shield-alt',
            groups: [
                {
                    title: 'Token & Phiên',
                    description: 'Cấu hình JWT và session',
                    fields: [
                        { key: 'jwt_expiry_giay', label: 'JWT hết hạn (giây)', type: 'number', hint: '3600 = 1 giờ, 86400 = 1 ngày' },
                    ]
                },
                {
                    title: 'Khóa tài khoản',
                    description: 'Bảo vệ khỏi tấn công brute-force',
                    fields: [
                        { key: 'so_lan_sai_mat_khau', label: 'Số lần sai tối đa', type: 'number', hint: 'Khóa sau N lần sai mật khẩu' },
                        { key: 'thoi_gian_khoa_phut', label: 'Thời gian khóa (phút)', type: 'number', hint: 'Khóa tài khoản trong N phút' },
                    ]
                },
                {
                    title: 'OTP',
                    description: 'Xác thực 2 yếu tố',
                    fields: [
                        { key: 'otp_het_han_phut', label: 'OTP hết hạn (phút)', type: 'number', hint: 'Mã OTP có hiệu lực trong N phút' },
                    ]
                }
            ]
        },
        payment: {
            label: 'Thanh toán',
            description: 'Cấu hình tiền tệ, thuế và phí',
            icon: 'fas fa-credit-card',
            groups: [
                {
                    title: 'Tiền tệ & Thuế',
                    description: 'Cấu hình đơn vị tiền và thuế VAT',
                    fields: [
                        { key: 'tien_te', label: 'Đơn vị tiền tệ', type: 'text', hint: 'VND, USD, EUR...' },
                        { key: 'thue_vat_phan_tram', label: 'Thuế VAT (%)', type: 'number', hint: 'Áp dụng cho tất cả giao dịch' },
                    ]
                },
                {
                    title: 'Phí vận chuyển',
                    description: 'Cấu hình phí ship cho đơn hàng',
                    fields: [
                        { key: 'phi_giao_hang_mac_dinh', label: 'Phí ship mặc định', type: 'number', hint: 'Đơn vị: VND' },
                        { key: 'mien_phi_giao_hang_tu', label: 'Miễn phí ship từ', type: 'number', hint: 'Miễn phí khi đơn hàng >= N VND' },
                    ]
                }
            ]
        },
        loyalty: {
            label: 'Chương trình Tích điểm',
            description: 'Cấu hình quy tắc tích và đổi điểm',
            icon: 'fas fa-star',
            groups: [
                {
                    title: 'Quy tắc tích điểm',
                    description: 'Cách thức tích lũy điểm thưởng',
                    fields: [
                        { key: 'diem_tren_moi_1000_dong', label: 'Mỗi bao nhiêu VND = 1 điểm', type: 'number', hint: 'VD: 100.000 = mỗi 100k được 1 điểm' },
                        { key: '1_diem_bang_dong', label: '1 điểm = bao nhiêu VND', type: 'number', hint: 'Giá trị khi quy đổi điểm thành tiền' },
                    ]
                }
            ]
        },
        theme: {
            label: 'Giao diện',
            description: 'Tùy chỉnh màu sắc thương hiệu',
            icon: 'fas fa-palette',
            groups: [
                {
                    title: 'Màu sắc chính',
                    description: 'Màu thương hiệu hiển thị trên toàn hệ thống',
                    fields: [
                        { key: 'mau_chu_dao', label: 'Màu chủ đạo', type: 'color', hint: 'Màu nền buttons, links...' },
                        { key: 'mau_phu', label: 'Màu phụ', type: 'color', hint: 'Màu accent, hover...' },
                    ]
                }
            ]
        }
    };

    async function nqtLoadCauHinh() {
        const groups = ['website', 'business', 'security', 'email', 'payment', 'loyalty', 'theme'];
        const results = await Promise.all(groups.map(g => nqtApi.fetch(`/api/nqt-cau-hinh?g6_nhom=${g}`)));
        groups.forEach((g, i) => {
            nqtCauHinhData[g] = {};
            if (results[i] && results[i].nqt_thanh_cong) {
                results[i].nqt_du_lieu.forEach(row => {
                    nqtCauHinhData[g][row.g6_khoa] = row.g6_gia_tri;
                });
            }
        });
        nqtSwitchTab(nqtActiveTab);
    }

    window.nqtSwitchTab = function(tab) {
        nqtActiveTab = tab;
        localStorage.setItem('nqt_cau_hinh_tab', tab);
        document.querySelectorAll('.nqt-tab-pill').forEach(btn => {
            const isActive = btn.dataset.tab === tab;
            if (isActive) {
                btn.classList.add('bg-[#191919]', 'dark:bg-[#fafafa]', 'text-white', 'dark:text-[#191919]');
                btn.classList.remove('text-[#666]', 'dark:text-[#888]', 'hover:bg-[#f5f5f5]', 'dark:hover:bg-[#333]');
            } else {
                btn.classList.remove('bg-[#191919]', 'dark:bg-[#fafafa]', 'text-white', 'dark:text-[#191919]');
                btn.classList.add('text-[#666]', 'dark:text-[#888]', 'hover:bg-[#f5f5f5]', 'dark:hover:bg-[#333]');
            }
        });
        nqtRenderTab(tab);
    }

    function nqtRenderTab(tab) {
        const def = nqtTabDefs[tab];
        const groupData = nqtCauHinhData[tab] || {};
        const content = document.getElementById('nqtTabContent');

        let groupsHtml = def.groups.map(grp => {
            let fieldsHtml = grp.fields.map(f => nqtRenderField(f, groupData['g6_' + f.key])).join('');
            return `
                <div class="bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md overflow-hidden">
                    <div class="px-4 py-3 border-b border-[#e5e5e5] dark:border-[#404040] bg-[#fafafa] dark:bg-[#333]">
                        <h3 class="font-medium text-[#191919] dark:text-[#fafafa] text-sm">${grp.title}</h3>
                        <p class="text-xs text-[#666] dark:text-[#888]">${grp.description}</p>
                    </div>
                    <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${fieldsHtml}
                    </div>
                </div>
            `;
        }).join('');

        let actionsHtml = '';
        if (def.actions) {
            actionsHtml = def.actions.map(a => `
                <button type="button" onclick="nqtRunAction('${a.id}')" class="px-3 py-2 bg-[#f5f5f5] dark:bg-[#333] border border-[#e5e5e5] dark:border-[#404040] text-[#191919] dark:text-[#fafafa] text-sm font-medium rounded-md hover:bg-[#e5e5e5] dark:hover:bg-[#404040] transition-colors flex items-center space-x-2">
                    <i class="${a.icon}"></i><span>${a.label}</span>
                </button>
            `).join('');
        }

        content.innerHTML = `
            <form id="formCauHinh" onsubmit="nqtSaveCauHinh(event, '${tab}')">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-sm font-medium text-[#191919] dark:text-[#fafafa]">${def.label}</h2>
                        <p class="text-xs text-[#666] dark:text-[#888]">${def.description}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        ${actionsHtml}
                        <button type="submit" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors flex items-center space-x-2">
                            <i class="fas fa-save"></i><span>Lưu thay đổi</span>
                        </button>
                    </div>
                </div>
                <div class="space-y-4">
                    ${groupsHtml}
                </div>
            </form>
        `;

        content.querySelectorAll('input[type="color"]').forEach(picker => {
            picker.addEventListener('input', () => {
                const textInput = picker.parentElement.querySelector('input[type="text"]');
                if (textInput) textInput.value = picker.value;
            });
        });
    }

    function nqtRenderField(f, val) {
        val = val !== undefined ? val : '';
        let inputHtml = '';
        const baseClass = 'w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa] placeholder-[#a3a3a3]';

        if (f.type === 'textarea') {
            inputHtml = `<textarea name="${f.key}" rows="3" placeholder="${f.placeholder || ''}" class="${baseClass} resize-none">${nqtEscape(val)}</textarea>`;
        } else if (f.type === 'select') {
            const options = f.options.map(o => `<option value="${o.value}" ${val === o.value ? 'selected' : ''}>${o.label}</option>`).join('');
            inputHtml = `<select name="${f.key}" class="${baseClass}">${options}</select>`;
        } else if (f.type === 'color') {
            inputHtml = `
                <div class="flex items-center space-x-2">
                    <input type="color" name="${f.key}" value="${nqtEscape(val) || '#191919'}" class="w-10 h-10 rounded-md border border-[#e5e5e5] dark:border-[#404040] cursor-pointer p-0.5 bg-white dark:bg-[#1a1a1a]">
                    <input type="text" name="${f.key}_text" value="${nqtEscape(val) || '#191919'}" class="flex-1 px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md font-mono uppercase text-[#191919] dark:text-[#fafafa]" oninput="this.previousElementSibling.value = this.value" maxlength="7">
                </div>`;
        } else if (f.type === 'image') {
            const nqtHasImage = val && val.length > 0;
            inputHtml = `
                <div class="space-y-2">
                    <div class="flex items-center space-x-3">
                        <div id="preview_${f.key}" class="w-16 h-16 rounded-md border border-dashed border-[#e5e5e5] dark:border-[#404040] flex items-center justify-center overflow-hidden bg-[#fafafa] dark:bg-[#333]">
                            ${nqtHasImage ? `<img src="${nqtEscape(val)}" class="w-full h-full object-contain" alt="">` : `<i class="fas fa-cloud-upload-alt text-[#a3a3a3]"></i>`}
                        </div>
                        <div class="space-y-1">
                            <input type="file" id="file_${f.key}" accept="image/*" class="hidden" onchange="nqtPreviewImage('${f.key}', this)">
                            <button type="button" onclick="document.getElementById('file_${f.key}').click()" class="px-3 py-1.5 bg-[#f5f5f5] dark:bg-[#333] text-[#525252] dark:text-[#a3a3a3] text-xs font-medium rounded-md hover:bg-[#e5e5e5] dark:hover:bg-[#404040]">
                                <i class="fas fa-upload mr-1"></i>Tải lên
                            </button>
                            ${nqtHasImage ? `<button type="button" onclick="nqtClearImage('${f.key}')" class="px-3 py-1.5 text-[#dc2626] text-xs font-medium rounded-md hover:bg-[#fef2f2] dark:hover:bg-[#991b1b]/20 ml-1"><i class="fas fa-trash mr-1"></i>Xóa</button>` : ''}
                        </div>
                    </div>
                    <input type="hidden" name="${f.key}" value="${nqtEscape(val)}">
                </div>`;
        } else if (f.type === 'password') {
            inputHtml = `
                <div class="relative">
                    <input type="password" name="${f.key}" value="${nqtEscape(val)}" placeholder="${f.placeholder || ''}" class="${baseClass} pr-10" id="input_${f.key}">
                    <button type="button" onclick="nqtTogglePassword('${f.key}')" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#a3a3a3] hover:text-[#666]">
                        <i class="fas fa-eye" id="icon_${f.key}"></i>
                    </button>
                </div>`;
        } else {
            inputHtml = `<input type="${f.type}" name="${f.key}" value="${nqtEscape(val)}" placeholder="${f.placeholder || ''}" class="${baseClass}">`;
        }

        const hint = f.hint ? `<p class="text-xs text-[#a3a3a3] dark:text-[#666] mt-1">${f.hint}</p>` : '';

        return `
            <div class="${f.type === 'textarea' ? 'md:col-span-2' : ''}">
                <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">${f.label}</label>
                ${inputHtml}
                ${hint}
            </div>
        `;
    }

    window.nqtTogglePassword = function(key) {
        const input = document.getElementById(`input_${key}`);
        const icon = document.getElementById(`icon_${key}`);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    window.nqtSaveCauHinh = async function(e, tab) {
        e.preventDefault();
        const nqtSaveBtn = document.querySelector('#formCauHinh [type="submit"]');
        const nqtRestore = nqtBtnLoading(nqtSaveBtn, 'Đang lưu...');
        const form = document.getElementById('formCauHinh');
        const def = nqtTabDefs[tab];
        const payload = {};

        def.groups.forEach(grp => {
            grp.fields.forEach(f => {
                if (f.type === 'color') {
                    const textInput = form.querySelector(`[name="${f.key}_text"]`);
                    payload['g6_' + f.key] = textInput ? textInput.value.trim() : form.querySelector(`[name="${f.key}"]`).value;
                } else {
                    const el = form.querySelector(`[name="${f.key}"]`);
                    if (el) payload['g6_' + f.key] = el.value;
                }
            });
        });
        payload['g6_nhom'] = tab;

        const res = await nqtApi.fetch('/api/nqt-cau-hinh', { method: 'PUT', body: payload });
        nqtRestore();
        if (res && res.nqt_thanh_cong) {
            if (!nqtCauHinhData[tab]) nqtCauHinhData[tab] = {};
            Object.assign(nqtCauHinhData[tab], payload);
            nqtToast('Đã lưu cấu hình!', 'success');
        } else {
            nqtToast(res?.nqt_thong_diep || 'Lỗi khi lưu', 'error');
        }
    }

    window.nqtRunAction = async function(actionId) {
        if (actionId === 'testEmail') {
            const email = prompt('Nhập email nhận test:', '');
            if (!email) return;
            nqtToast('Đang gửi email test...', 'info');
            const res = await nqtApi.fetch('/api/nqt-email/test', { method: 'POST', body: { g6_email_nhan: email } });
            if (res && res.nqt_thanh_cong) {
                nqtToast('Gửi email test thành công!', 'success');
            } else {
                nqtToast(res?.nqt_thong_diep || 'Gửi email thất bại', 'error');
            }
        }
    }

    function nqtEscape(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    window.nqtPreviewImage = async function(key, input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        if (file.size > 5 * 1024 * 1024) {
            nqtToast('File quá lớn. Tối đa 5MB', 'error');
            input.value = '';
            return;
        }

        const preview = document.getElementById(`preview_${key}`);
        preview.innerHTML = '<i class="fas fa-spinner fa-spin text-[#191919] dark:text-[#fafafa]"></i>';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/nqt-upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('nqt_token')}` },
                body: formData
            });
            const data = await res.json();

            if (data.nqt_thanh_cong) {
                const url = data.nqt_du_lieu.g6_url;
                preview.innerHTML = `<img src="${url}" class="w-full h-full object-contain" alt="">`;
                document.querySelector(`[name="${key}"]`).value = url;
                nqtToast('Upload thành công!', 'success');
            } else {
                preview.innerHTML = '<i class="fas fa-cloud-upload-alt text-[#a3a3a3]"></i>';
                nqtToast(data.nqt_thong_diep || 'Lỗi upload', 'error');
            }
        } catch (err) {
            preview.innerHTML = '<i class="fas fa-cloud-upload-alt text-[#a3a3a3]"></i>';
            nqtToast('Lỗi kết nối', 'error');
        }
        input.value = '';
    }

    window.nqtClearImage = function(key) {
        document.getElementById(`preview_${key}`).innerHTML = '<i class="fas fa-cloud-upload-alt text-[#a3a3a3]"></i>';
        document.querySelector(`[name="${key}"]`).value = '';
    }

    nqtLoadCauHinh();
})();
</script>
{% endblock %}
