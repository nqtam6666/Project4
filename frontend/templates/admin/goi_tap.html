{% extends "admin/base_nqt.html" %}

{% block title %}Quản lý Gói tập{% endblock %}

{% block content %}
<div class="space-y-8 animate-fade-in">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-bold text-[#0F172A]">Danh sách Gói tập</h2>
            <p class="text-[#64748B] text-sm font-medium">Cấu hình các gói dịch vụ cho phòng tập</p>
        </div>
        <button onclick="openModal('modalAddPackage')" 
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center space-x-2">
            <i class="fas fa-plus"></i>
            <span>Tạo gói mới</span>
        </button>
    </div>

    <!-- Package Grid -->
    <div id="packageGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <!-- Data loaded via JS -->
        <div class="col-span-full py-20 text-center text-[#64748B]">
            <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
            <p>Đang tải danh sách gói tập...</p>
        </div>
    </div>
</div>

<!-- Modal: Add Package -->
<div id="modalAddPackage" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl animate-scale-up overflow-hidden">
        <div class="px-8 py-6 border-b border-[#E2E8F0] flex items-center justify-between bg-emerald-600 text-white">
            <h3 class="text-xl font-bold">Tạo gói tập mới</h3>
            <button onclick="closeModal('modalAddPackage')" class="text-white hover:opacity-70 transition-opacity">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <form id="formAddPackage" class="p-8 space-y-5">
            <div class="space-y-2">
                <label class="text-sm font-bold text-[#334155]">Tên gói tập *</label>
                <input type="text" name="nqt_ten_goi" required placeholder="Ví dụ: Gói 3 tháng Gold"
                       class="w-full px-4 py-3 bg-[#F8FAFC] border border-[#E2E8F0] rounded-2xl focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-[#334155]">Giá (VND) *</label>
                    <input type="number" name="nqt_gia" required value="0"
                           class="w-full px-4 py-3 bg-[#F8FAFC] border border-[#E2E8F0] rounded-2xl focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-[#334155]">Số ngày *</label>
                    <input type="number" name="nqt_so_ngay" required value="30"
                           class="w-full px-4 py-3 bg-[#F8FAFC] border border-[#E2E8F0] rounded-2xl focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-bold text-[#334155]">Chi nhánh *</label>
                <select name="nqt_ma_chi_nhanh" required class="w-full px-4 py-3 bg-[#F8FAFC] border border-[#E2E8F0] rounded-2xl transition-all outline-none">
                    <option value="1">Chi nhánh Cầu Giấy</option>
                </select>
            </div>
            <div class="flex items-center space-x-2 p-2">
                <input type="checkbox" name="nqt_co_pt" id="checkPT" class="w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                <label for="checkPT" class="text-sm font-medium text-[#334155]">Bao gồm huấn luyện viên (PT)</label>
            </div>
            <div class="flex justify-end space-x-4 pt-4 border-t border-[#E2E8F0]">
                <button type="button" onclick="closeModal('modalAddPackage')" class="px-6 py-3 bg-gray-100 text-gray-700 font-bold rounded-2xl hover:bg-gray-200 transition-all">Hủy</button>
                <button type="submit" class="px-8 py-3 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all">Lưu gói tập</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    async function loadPackages() {
        const grid = document.getElementById('packageGrid');
        grid.innerHTML = '<div class="col-span-full py-20 text-center"><i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i></div>';

        const data = await nqtApi.fetch('/api/nqt-goi-tap');
        if (!data || !data.nqt_thanh_cong) return;

        const list = data.nqt_du_lieu;
        grid.innerHTML = '';

        list.forEach(g => {
            const formattedGia = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(g.nqt_gia);
            grid.innerHTML += `
                <div class="bg-white rounded-3xl border border-[#E2E8F0] p-8 shadow-sm hover:shadow-xl transition-all group border-t-8 ${g.nqt_la_noi_bat ? 'border-orange-500' : 'border-blue-500'}">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="text-xl font-bold text-[#0F172A]">${g.nqt_ten_goi}</h3>
                            <p class="text-[#64748B] text-sm font-medium mt-1">${g.nqt_so_ngay} ngày tập luyện</p>
                        </div>
                        ${g.nqt_la_noi_bat ? '<span class="px-3 py-1 bg-orange-100 text-orange-600 text-[10px] font-bold uppercase rounded-lg">Nổi bật</span>' : ''}
                    </div>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex items-center text-sm text-[#475569]">
                            <i class="fas fa-check-circle text-emerald-500 mr-2"></i> 
                            ${g.nqt_co_pt ? 'Gồm PT' : 'Tập tự do'}
                        </div>
                        <div class="flex items-center text-sm text-[#475569]">
                            <i class="fas fa-check-circle text-emerald-500 mr-2"></i> 
                            ${g.nqt_co_sauna ? 'Có xông hơi' : 'Phòng tập tiêu chuẩn'}
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-6 border-t border-[#F1F5F9]">
                        <div class="text-2xl font-extrabold text-blue-600 leading-none">${formattedGia}</div>
                        <div class="flex space-x-1">
                            <button class="w-10 h-10 flex items-center justify-center text-[#64748B] hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all"><i class="fas fa-edit"></i></button>
                            <button class="w-10 h-10 flex items-center justify-center text-[#64748B] hover:bg-red-50 hover:text-red-600 rounded-xl transition-all"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Modal helpers
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    // Form
    document.getElementById('formAddPackage').onsubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd);
        data.nqt_gia = parseFloat(data.nqt_gia);
        data.nqt_so_ngay = parseInt(data.nqt_so_ngay);
        data.nqt_ma_chi_nhanh = parseInt(data.nqt_ma_chi_nhanh);
        data.nqt_co_pt = e.target.nqt_co_pt.checked;

        const res = await nqtApi.fetch('/api/nqt-goi-tap', { method: 'POST', body: data });
        if (res && res.nqt_thanh_cong) {
            closeModal('modalAddPackage');
            e.target.reset();
            loadPackages();
        } else {
            alert(res?.nqt_thong_diep || 'Lỗi khi tạo gói tập');
        }
    };

    loadPackages();
</script>
{% endblock %}
