<!DOCTYPE html>
<html lang="vi" id="nqtHtmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NQT Gym</title>
    <script>if (localStorage.getItem('nqt_dark_mode') === 'true') { document.documentElement.classList.add('dark'); }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
</head>
<body class="bg-[#FAFAF9] dark:bg-[#1a1a1a] min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-[#191919] dark:bg-white rounded-md flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-dumbbell text-white dark:text-[#191919] text-lg"></i>
            </div>
            <h1 class="text-xl font-semibold text-[#191919] dark:text-[#fafafa]">Đăng nhập</h1>
            <p class="text-sm text-[#666] dark:text-[#888] mt-1">NQT Gym Management</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md p-6">
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1.5">
                        Tên đăng nhập
                    </label>
                    <input type="text" id="username" name="g6_ten_dang_nhap" required
                           class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#d4d4d4] dark:border-[#404040] rounded-md text-[#191919] dark:text-[#fafafa] placeholder-[#a3a3a3] dark:placeholder-[#666] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] focus-visible:ring-offset-1 dark:focus-visible:ring-offset-[#262626] transition-shadow"
                           placeholder="admin">
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1.5">
                        Mật khẩu
                    </label>
                    <input type="password" id="password" name="g6_mat_khau" required
                           class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#d4d4d4] dark:border-[#404040] rounded-md text-[#191919] dark:text-[#fafafa] placeholder-[#a3a3a3] dark:placeholder-[#666] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] focus-visible:ring-offset-1 dark:focus-visible:ring-offset-[#262626] transition-shadow"
                           placeholder="••••••••">
                </div>

                <div id="errorMessage" class="hidden text-sm text-[#dc2626] dark:text-[#f87171] bg-[#fef2f2] dark:bg-[#451a1a] border border-[#fecaca] dark:border-[#7f1d1d] rounded-md px-3 py-2">
                    <i class="fas fa-exclamation-circle mr-1.5"></i>
                    <span>Sai thông tin đăng nhập</span>
                </div>

                <button type="submit" id="loginBtn"
                        class="w-full py-2.5 bg-[#191919] dark:bg-[#fafafa] hover:bg-[#404040] dark:hover:bg-[#e5e5e5] text-white dark:text-[#191919] text-sm font-medium rounded-md transition-colors duration-150 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] focus-visible:ring-offset-2 dark:focus-visible:ring-offset-[#262626] disabled:opacity-50 disabled:cursor-not-allowed">
                    Đăng nhập
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-[#a3a3a3] dark:text-[#666] mt-6">
            NQT Gym Management System
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Đang xử lý...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            const payload = {
                g6_ten_dang_nhap: document.getElementById('username').value,
                g6_mat_khau: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/nqt-dang-nhap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.nqt_thanh_cong) {
                    localStorage.setItem('nqt_token', data.nqt_du_lieu.g6_access_token);
                    window.location.href = '/admin/dashboard';
                } else {
                    errorMsg.querySelector('span').textContent = data.nqt_thong_diep || 'Đăng nhập thất bại';
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = 'Đăng nhập';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.querySelector('span').textContent = 'Lỗi kết nối máy chủ';
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'Đăng nhập';
                btn.disabled = false;
            }
        });

        if (localStorage.getItem('nqt_token')) {
            window.location.href = '/admin/dashboard';
        }
    </script>
</body>
</html>
