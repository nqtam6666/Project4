<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Huấn Luyện Viên — NQT GYM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: { colors: {
    "neon-lime":"#C8F135","neon-dim":"#A8D120","bg-main":"#0A0A0F","bg-card":"#12121A",
    "bg-elevated":"#1C1C28","text-primary":"#F5F5F0","text-secondary":"#A1A1AA",
    "text-muted":"#52525B","border-subtle":"rgba(255,255,255,0.06)",
    "border-neon":"rgba(200,241,53,0.3)","neon-glow":"rgba(200,241,53,0.15)",
    "success":"#22C55E","warning":"#F59E0B",
  }, fontFamily: { "sans":["Inter","sans-serif"],"mono":["JetBrains Mono","monospace"],"caps":["Space Grotesk","sans-serif"] } } }
}
</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}</style>
</head>
<body class="bg-bg-main text-text-primary font-sans antialiased">
<div class="pt-[72px]">

  <!-- Hero -->
  <section class="py-20 px-6 text-center relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(200,241,53,0.07),transparent_60%)]"></div>
    <div class="relative max-w-3xl mx-auto">
      <div class="inline-flex items-center gap-2 bg-neon-glow border border-border-neon text-neon-lime text-xs font-caps uppercase tracking-widest px-4 py-1.5 rounded-full mb-6">
        <span class="material-symbols-outlined text-sm">sports</span> Đội ngũ chuyên nghiệp
      </div>
      <h1 class="text-4xl md:text-5xl font-black text-white leading-tight mb-4">Huấn Luyện Viên <span class="text-neon-lime">Của Chúng Tôi</span></h1>
      <p class="text-text-secondary text-lg">Đội ngũ HLV được chứng nhận quốc tế, tận tâm đồng hành cùng hành trình của bạn.</p>
    </div>
  </section>

  <!-- Filter -->
  <div class="max-w-screen-xl mx-auto px-6 mb-8 flex flex-wrap gap-3">
    <button onclick="nqtFilterHlv('')" id="nqt-filter-all" class="nqt-filter-btn bg-neon-lime text-bg-main px-4 py-1.5 rounded-full font-caps text-xs uppercase tracking-wide font-semibold transition-all">Tất cả</button>
    <button onclick="nqtFilterHlv('yoga')" class="nqt-filter-btn border border-border-subtle text-text-secondary px-4 py-1.5 rounded-full font-caps text-xs uppercase tracking-wide font-semibold hover:border-border-neon hover:text-neon-lime transition-all">Yoga</button>
    <button onclick="nqtFilterHlv('boxing')" class="nqt-filter-btn border border-border-subtle text-text-secondary px-4 py-1.5 rounded-full font-caps text-xs uppercase tracking-wide font-semibold hover:border-border-neon hover:text-neon-lime transition-all">Boxing</button>
    <button onclick="nqtFilterHlv('strength')" class="nqt-filter-btn border border-border-subtle text-text-secondary px-4 py-1.5 rounded-full font-caps text-xs uppercase tracking-wide font-semibold hover:border-border-neon hover:text-neon-lime transition-all">Tạ / Sức mạnh</button>
    <button onclick="nqtFilterHlv('cardio')" class="nqt-filter-btn border border-border-subtle text-text-secondary px-4 py-1.5 rounded-full font-caps text-xs uppercase tracking-wide font-semibold hover:border-border-neon hover:text-neon-lime transition-all">Cardio</button>
  </div>

  <!-- Grid -->
  <section class="max-w-screen-xl mx-auto px-6 pb-24">
    <div id="nqtHlvGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div class="sm:col-span-2 lg:col-span-3 xl:col-span-4 flex justify-center py-20">
        <div class="w-8 h-8 border-2 border-neon-lime border-t-transparent rounded-full animate-spin"></div>
      </div>
    </div>
  </section>

</div>

<!-- Profile Modal -->
<div id="nqtHlvModal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="bg-bg-card border border-border-subtle rounded-2xl max-w-lg w-full overflow-hidden">
    <div class="flex items-center justify-between p-6 border-b border-border-subtle">
      <h3 class="text-lg font-black text-white">Hồ sơ HLV</h3>
      <button onclick="document.getElementById('nqtHlvModal').classList.add('hidden')" class="text-text-muted hover:text-text-primary transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="nqtHlvModalBody" class="p-6"></div>
  </div>
</div>

<script type="module">
import { nqtRenderPublicNav, nqtRenderFooter, nqtFormatPrice } from '/src/js/nqtLayout.js';
nqtRenderPublicNav('hlv');
nqtRenderFooter();

let nqtAllHlv = [];

window.nqtFilterHlv = function(chuyen) {
  document.querySelectorAll('.nqt-filter-btn').forEach(b => {
    b.className = b.className.replace('bg-neon-lime text-bg-main', 'border border-border-subtle text-text-secondary').replace('hover:border-border-neon hover:text-neon-lime', '');
  });
  event.target.className = event.target.className.replace('border border-border-subtle text-text-secondary', 'bg-neon-lime text-bg-main');
  const filtered = chuyen ? nqtAllHlv.filter(h => (h.g6_chuyen_mon || '').toLowerCase().includes(chuyen)) : nqtAllHlv;
  nqtRenderHlv(filtered);
};

window.nqtShowHlv = function(id) {
  const hlv = nqtAllHlv.find(h => h.g6_ma_hlv === id);
  if (!hlv) return;
  document.getElementById('nqtHlvModalBody').innerHTML = `
    <div class="flex items-start gap-5 mb-5">
      <div class="w-20 h-20 rounded-2xl bg-neon-glow border border-border-neon flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-neon-lime text-4xl">person</span>
      </div>
      <div>
        <div class="text-xl font-black text-white">${hlv.g6_ho_ten || 'Huấn luyện viên'}</div>
        <div class="text-neon-lime font-caps text-xs uppercase tracking-wide mt-1">${hlv.g6_chuyen_mon || ''}</div>
        <div class="flex items-center gap-1 mt-2">
          ${Array(5).fill(0).map((_,i) => `<span class="material-symbols-outlined text-sm ${i < Math.round(hlv.g6_thu_hang || 0) ? 'text-warning' : 'text-text-muted'}">star</span>`).join('')}
          <span class="text-text-muted text-xs ml-1">(${hlv.g6_thu_hang || 0}/5)</span>
        </div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-bg-elevated rounded-xl p-4 text-center">
        <div class="text-neon-lime font-mono text-xl font-bold">${hlv.g6_cap_chung_chi || '—'}</div>
        <div class="text-text-muted text-xs mt-1 font-caps uppercase tracking-wide">Chứng chỉ</div>
      </div>
      <div class="bg-bg-elevated rounded-xl p-4 text-center">
        <div class="text-neon-lime font-mono text-xl font-bold">${nqtFormatPrice(hlv.g6_gia_theo_buoi)}</div>
        <div class="text-text-muted text-xs mt-1 font-caps uppercase tracking-wide">/ buổi</div>
      </div>
    </div>
    <a href="/login" class="block w-full text-center bg-neon-lime text-bg-main py-3 rounded-lg font-caps text-sm uppercase tracking-wide font-semibold hover:bg-neon-dim transition-colors">
      Đặt lịch tập
    </a>`;
  document.getElementById('nqtHlvModal').classList.remove('hidden');
};

function nqtRenderHlv(list) {
  const grid = document.getElementById('nqtHlvGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="sm:col-span-2 lg:col-span-3 xl:col-span-4 text-center py-20 text-text-muted">Không có kết quả.</div>';
    return;
  }
  grid.innerHTML = list.map(h => `
  <div class="bg-bg-card border border-border-subtle rounded-2xl overflow-hidden hover:border-border-neon transition-all hover:-translate-y-1 cursor-pointer group" onclick="nqtShowHlv(${h.g6_ma_hlv})">
    <div class="h-48 bg-bg-elevated flex items-center justify-center relative overflow-hidden">
      <span class="material-symbols-outlined text-6xl text-text-muted group-hover:text-neon-lime transition-colors">person</span>
      <div class="absolute bottom-3 right-3 bg-neon-lime text-bg-main text-[10px] font-caps uppercase tracking-widest font-bold px-2.5 py-0.5 rounded-full">
        ${h.g6_cap_chung_chi || 'HLV'}
      </div>
    </div>
    <div class="p-5">
      <h3 class="font-black text-white text-base mb-0.5">${h.g6_ho_ten || 'Huấn luyện viên'}</h3>
      <div class="text-neon-lime font-caps text-xs uppercase tracking-wide mb-3">${h.g6_chuyen_mon || 'Đa môn'}</div>
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-0.5">
          ${Array(5).fill(0).map((_,i)=>`<span class="material-symbols-outlined text-sm ${i<Math.round(h.g6_thu_hang||0)?'text-warning':'text-text-muted'}">star</span>`).join('')}
        </div>
        <div class="text-neon-lime font-mono text-sm font-semibold">${nqtFormatPrice(h.g6_gia_theo_buoi)}<span class="text-text-muted text-xs">/buổi</span></div>
      </div>
    </div>
  </div>`).join('');
}

(async () => {
  try {
    const r = await fetch('/api/nqt-public/huan-luyen-vien');
    const j = await r.json();
    nqtAllHlv = Array.isArray(j.nqt_du_lieu) ? j.nqt_du_lieu : (Array.isArray(j.data) ? j.data : (Array.isArray(j) ? j : []));
    nqtRenderHlv(nqtAllHlv);
  } catch {
    document.getElementById('nqtHlvGrid').innerHTML = '<div class="sm:col-span-2 lg:col-span-3 xl:col-span-4 text-center py-20 text-text-muted">Không thể tải dữ liệu.</div>';
  }
})();
</script>
</body>
</html>
