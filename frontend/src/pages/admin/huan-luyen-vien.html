<!DOCTYPE html>
<html lang="vi" id="nqtHtmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huấn luyện viên - NQT Gym Admin</title>
    <script>if (localStorage.getItem('nqt_dark_mode') === 'true') { document.documentElement.classList.add('dark'); }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="nqt-page-content" style="display:none" class="space-y-4">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-lg font-semibold text-[#191919] dark:text-[#fafafa]">Huấn luyện viên</h1>
            <p class="text-sm text-[#666] dark:text-[#888]">Quản lý HLV, gói PT và lịch buổi tập</p>
        </div>
        <button id="nqtBtnThem" onclick="nqtMoModal('nqtModalThemHLV')" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors">
            <i class="fas fa-plus"></i>Thêm HLV
        </button>
    </div>

    <!-- Tabs -->
    <div class="flex space-x-1 border-b border-[#e5e5e5] dark:border-[#404040]">
        <button onclick="nqtChuyenTab('hlv')" id="nqtTabHLV" class="px-4 py-2 text-sm font-medium border-b-2 border-[#191919] dark:border-[#fafafa] text-[#191919] dark:text-[#fafafa] -mb-px">HLV</button>
        <button onclick="nqtChuyenTab('goipt')" id="nqtTabGoiPT" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-[#666] dark:text-[#888] hover:text-[#191919] dark:hover:text-[#fafafa] -mb-px">Gói PT</button>
        <button onclick="nqtChuyenTab('dangky')" id="nqtTabDangKy" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-[#666] dark:text-[#888] hover:text-[#191919] dark:hover:text-[#fafafa] -mb-px">Đăng ký PT</button>
        <button onclick="nqtChuyenTab('buoitap')" id="nqtTabBuoiTap" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-[#666] dark:text-[#888] hover:text-[#191919] dark:hover:text-[#fafafa] -mb-px">Buổi tập</button>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3">
        <div class="relative flex-1 max-w-md">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#a3a3a3]"><i class="fas fa-search text-sm"></i></span>
            <input type="text" id="nqtTimKiem" oninput="nqtXuLyTimKiem()" placeholder="Tìm theo tên, chuyên môn..."
                class="w-full pl-9 pr-4 py-2 text-sm bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa] placeholder-[#a3a3a3]">
        </div>
        <button onclick="nqtTaiDuLieu()" class="px-3 py-2 bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md hover:bg-[#f5f5f5] dark:hover:bg-[#333] transition-colors" title="Làm mới">
            <i class="fas fa-sync-alt text-[#666] dark:text-[#888] text-sm"></i>
        </button>
    </div>

    <!-- Table -->
    <div class="bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-[#fafafa] dark:bg-[#333] border-b border-[#e5e5e5] dark:border-[#404040]">
                    <tr id="nqtTableHead">
                        <th class="px-4 py-3 text-left text-xs font-medium text-[#666] dark:text-[#888] uppercase">Huấn luyện viên</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-[#666] dark:text-[#888] uppercase">Chuyên môn</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-[#666] dark:text-[#888] uppercase">SĐT</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-[#666] dark:text-[#888] uppercase">Kinh nghiệm</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-[#666] dark:text-[#888] uppercase">Trạng thái</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-[#666] dark:text-[#888] uppercase">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="nqtTableBody" class="divide-y divide-[#e5e5e5] dark:divide-[#404040]">
                    <tr><td colspan="6" class="px-4 py-8 text-center text-sm text-[#666] dark:text-[#888]"><i class="fas fa-circle-notch fa-spin mr-2"></i>Đang tải...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="nqtPagination" class="px-4 py-3 border-t border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between hidden">
            <span id="nqtPagInfo" class="text-xs text-[#666] dark:text-[#888]"></span>
            <div id="nqtPagButtons" class="flex gap-1"></div>
        </div>
    </div>
</div>

<!-- Bulk Action Bar -->
<div id="nqtBulkBar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-40">
    <div class="bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] px-4 py-2.5 rounded-md shadow-lg flex items-center space-x-3">
        <span class="text-sm">Đã chọn <strong id="nqtSoDaChon">0</strong> HLV</span>
        <div class="w-px h-5 bg-white/20 dark:bg-[#191919]/20"></div>
        <button onclick="nqtMoBulkModal(true)" class="px-3 py-1.5 bg-[#16a34a] hover:bg-[#15803d] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
            <i class="fas fa-check-circle"></i><span>Hoạt động</span>
        </button>
        <button onclick="nqtMoBulkModal(false)" class="px-3 py-1.5 bg-[#d97706] hover:bg-[#b45309] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
            <i class="fas fa-eye-slash"></i><span>Tạm ngừng</span>
        </button>
        <button onclick="nqtMoBulkModal('delete')" class="px-3 py-1.5 bg-[#dc2626] hover:bg-[#b91c1c] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
            <i class="fas fa-trash-can"></i><span>Xoá</span>
        </button>
        <button onclick="nqtBoChonTatCa()" class="p-1.5 hover:bg-white/10 dark:hover:bg-[#191919]/10 rounded-md transition-colors" title="Bỏ chọn">
            <i class="fas fa-times"></i>
        </button>
    </div>
</div>

<!-- Modal: Bulk Action -->
<div id="modalBulkAction" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) nqtDongModal('modalBulkAction')">
    <div class="bg-white dark:bg-[#262626] rounded-md w-full max-w-sm shadow-lg">
        <div class="px-4 py-3 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between">
            <h3 class="font-semibold text-[#191919] dark:text-[#fafafa]" id="nqtBulkTitle">Thao tác hàng loạt</h3>
            <button onclick="nqtDongModal('modalBulkAction')" class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 text-center">
            <div class="w-12 h-12 mx-auto mb-4 bg-[#f5f5f5] dark:bg-[#404040] rounded-full flex items-center justify-center">
                <i class="fas fa-user-tie text-[#525252] dark:text-[#a3a3a3] text-xl" id="nqtBulkIcon"></i>
            </div>
            <p class="text-sm text-[#666] dark:text-[#888] mb-1">Bạn đang thực hiện thao tác cho</p>
            <p class="text-xl font-semibold text-[#191919] dark:text-[#fafafa]"><span id="nqtBulkCount">0</span> HLV</p>
            <p class="text-xs text-[#a3a3a3] dark:text-[#666] mt-2" id="nqtBulkMessage">Trạng thái sẽ được cập nhật.</p>
        </div>
        <div class="px-4 py-3 border-t border-[#e5e5e5] dark:border-[#404040] flex justify-end space-x-2">
            <button onclick="nqtDongModal('modalBulkAction')" class="px-4 py-2 text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]">Hủy</button>
            <button onclick="nqtXacNhanBulkAction()" id="nqtBulkConfirmBtn" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919]">Xác nhận</button>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa HLV -->
<div id="nqtModalThemHLV" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)nqtDongModal('nqtModalThemHLV')">
    <div class="bg-white dark:bg-[#262626] rounded-lg w-full max-w-lg border border-[#e5e5e5] dark:border-[#404040]">
        <div class="px-6 py-4 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between">
            <h3 id="nqtModalTitle" class="text-sm font-semibold text-[#191919] dark:text-[#fafafa]">Thêm huấn luyện viên</h3>
            <button onclick="nqtDongModal('nqtModalThemHLV')" class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"><i class="fas fa-times"></i></button>
        </div>
        <form id="nqtFormHLV" onsubmit="nqtLuuHLV(event)" class="p-6 space-y-4">
            <input type="hidden" id="nqtHLVId">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Họ tên *</label>
                    <input type="text" id="nqtHoTen" required placeholder="Nguyễn Văn A"
                        class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]">
                </div>
                <div>
                    <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Số điện thoại</label>
                    <input type="text" id="nqtSoDienThoai" placeholder="0901234567"
                        class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Chi nhánh *</label>
                    <select id="nqtChiNhanh" required class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]">
                        <option value="">-- Chọn chi nhánh --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Chuyên môn</label>
                    <input type="text" id="nqtChuyenMon" placeholder="Fitness, Yoga, Boxing..."
                        class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Năm kinh nghiệm</label>
                    <input type="number" id="nqtNamKinhNghiem" min="0" placeholder="3"
                        class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]">
                </div>
                <div>
                    <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Mức lương/buổi (VNĐ)</label>
                    <input type="number" id="nqtLuong" min="0" placeholder="300000"
                        class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]">
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1">Giới thiệu</label>
                <textarea id="nqtGioiThieu" rows="3" placeholder="Mô tả ngắn về HLV..."
                    class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="nqtDongModal('nqtModalThemHLV')" class="px-4 py-2 text-sm text-[#666] dark:text-[#888] hover:text-[#191919] dark:hover:text-[#fafafa] border border-[#e5e5e5] dark:border-[#404040] rounded-md hover:bg-[#f5f5f5] dark:hover:bg-[#333] transition-colors">Huỷ</button>
                <button type="submit" id="nqtBtnLuu" class="px-4 py-2 text-sm bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors">Lưu</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
import { nqtInitAdminLayout } from '/src/js/admin/nqtAdminLayout.js';
nqtInitAdminLayout('huan-luyen-vien');

let nqtTabHienTai = 'hlv';
let nqtTrang = 1;
let nqtTimKiemTimer = null;
let nqtDaChon = [];
let nqtBulkActionType = null;

window.nqtToggleRow = function(id, e) {
    if (e.target.closest('button') || e.target.closest('a')) return;
    const idx = nqtDaChon.indexOf(id);
    if (idx === -1) nqtDaChon.push(id);
    else nqtDaChon.splice(idx, 1);
    nqtCapNhatBulkBar();
    document.querySelectorAll('[data-row-id]').forEach(tr => {
        const trId = parseInt(tr.dataset.rowId);
        const sel = nqtDaChon.includes(trId);
        if (sel) {
            tr.classList.remove('hover:bg-[#fafafa]', 'dark:hover:bg-[#1a1a1a]');
            tr.classList.add('nqt-row-selected');
        } else {
            tr.classList.remove('nqt-row-selected');
            tr.classList.add('hover:bg-[#fafafa]', 'dark:hover:bg-[#1a1a1a]');
        }
    });
};

window.nqtBoChonTatCa = function() {
    nqtDaChon = [];
    document.querySelectorAll('[data-row-id]').forEach(tr => {
        tr.classList.remove('nqt-row-selected');
        tr.classList.add('hover:bg-[#fafafa]', 'dark:hover:bg-[#1a1a1a]');
    });
    nqtCapNhatBulkBar();
};

function nqtCapNhatBulkBar() {
    const bar = document.getElementById('nqtBulkBar');
    document.getElementById('nqtSoDaChon').textContent = nqtDaChon.length;
    if (nqtDaChon.length > 0) bar.classList.remove('hidden');
    else bar.classList.add('hidden');
}

window.nqtMoBulkModal = function(action) {
    nqtBulkActionType = action;
    document.getElementById('nqtBulkCount').textContent = nqtDaChon.length;
    
    if (action === 'delete') {
        document.getElementById('nqtBulkTitle').textContent = `Xoá huấn luyện viên`;
        document.getElementById('nqtBulkMessage').textContent = `Dữ liệu sẽ bị ẩn và loại khỏi danh sách (xoá mềm).`;
        document.getElementById('nqtBulkConfirmBtn').className = "inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#dc2626] text-white text-sm font-medium rounded-md hover:bg-[#b91c1c]";
    } else {
        const nqtLabels = { true: 'Hoạt động', false: 'Tạm ngừng' };
        document.getElementById('nqtBulkTitle').textContent = `Cập nhật sang ${nqtLabels[action]}`;
        document.getElementById('nqtBulkMessage').textContent = `HLV sẽ được cập nhật trạng thái hiển thị web.`;
        document.getElementById('nqtBulkConfirmBtn').className = "inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5]";
    }
    nqtMoModal('modalBulkAction');
}

window.nqtXacNhanBulkAction = async function() {
    if (nqtDaChon.length === 0) return;
    const btn = document.getElementById('nqtBulkConfirmBtn');
    const nqtRestoreBulk = nqtBtnLoading(btn, 'Đang xử lý...');

    let nqtThanhCong = 0, nqtThatBai = 0;
    for (const id of nqtDaChon) {
        let res;
        if (nqtBulkActionType === 'delete') {
            res = await nqtApi.fetch(`/api/nxv-hlv/${id}`, { method: 'DELETE' });
        } else {
            res = await nqtApi.fetch(`/api/nxv-hlv/${id}`, { method: 'PUT', body: { g6_la_hien_thi_web: nqtBulkActionType } });
        }
        if (res && res.nqt_thanh_cong) nqtThanhCong++;
        else nqtThatBai++;
    }

    nqtRestoreBulk();
    nqtDongModal('modalBulkAction');
    nqtBoChonTatCa();
    nqtTaiDuLieu();

    if (nqtThatBai === 0) nqtToast(`Đã xử lý ${nqtThanhCong} HLV!`, 'success');
    else nqtToast(`Thành công: ${nqtThanhCong}, Thất bại: ${nqtThatBai}`, 'warn');
}

const nqtTabConfig = {
    hlv:     { api: '/api/nxv-hlv',           label: 'HLV',        cols: ['Huấn luyện viên','Chuyên môn','SĐT','Kinh nghiệm','Trạng thái','Thao tác'] },
    goipt:   { api: '/api/nxv-goi-pt',        label: 'Gói PT',     cols: ['Tên gói','Số buổi','Giá (VNĐ)','Thời hạn (ngày)','Trạng thái','Thao tác'] },
    dangky:  { api: '/api/nxv-dang-ky-pt',    label: 'Đăng ký PT', cols: ['Hội viên','HLV','Gói PT','Ngày bắt đầu','Còn lại','Thao tác'] },
    buoitap: { api: '/api/nxv-buoi-tap-pt',   label: 'Buổi tập',   cols: ['Hội viên','HLV','Ngày tập','Giờ bắt đầu','Trạng thái','Thao tác'] },
};

function nqtAvatarHtml(name, size = 32) {
    if (!name) name = 'User';
    return `<img src="https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1C1C1C&color=C9A84C&size=${size}" class="rounded-full w-[${size}px] h-[${size}px] border border-white/10 shadow-sm" alt="${name}">`;
}

function nqtRenderHead() {
    const cols = nqtTabConfig[nqtTabHienTai].cols;
    document.getElementById('nqtTableHead').innerHTML = cols.map(c => `<th class="px-4 py-3 text-left text-xs font-medium text-[#666] dark:text-[#888] uppercase">${c}</th>`).join('');
}

function nqtChuyenTab(tab) {
    nqtTabHienTai = tab;
    nqtTrang = 1;
    nqtBoChonTatCa();
    document.querySelectorAll('[id^=nqtTab]').forEach(b => {
        b.classList.replace('border-[#191919]','border-transparent');
        b.classList.replace('dark:border-[#fafafa]','border-transparent');
        b.classList.replace('text-[#191919]','text-[#666]');
        b.classList.replace('dark:text-[#fafafa]','dark:text-[#888]');
    });
    
    const tabIds = { hlv: 'nqtTabHLV', goipt: 'nqtTabGoiPT', dangky: 'nqtTabDangKy', buoitap: 'nqtTabBuoiTap' };
    const btn = document.getElementById(tabIds[tab]);
    
    if (btn) {
        btn.classList.replace('border-transparent','border-[#191919]');
        btn.classList.add('dark:border-[#fafafa]','text-[#191919]','dark:text-[#fafafa]');
        btn.classList.remove('text-[#666]','dark:text-[#888]');
    }
    
    const btnThem = document.getElementById('nqtBtnThem');
    if (btnThem) {
        btnThem.style.display = tab === 'hlv' ? 'inline-flex' : 'none';
    }
    
    nqtRenderHead();
    nqtTaiDuLieu();
}

async function nqtLoadBranches() {
    const data = await nqtApi.fetch('/api/nqt-chi-nhanh');
    if (data?.nqt_thanh_cong) {
        const sel = document.getElementById('nqtChiNhanh');
        if(sel) sel.innerHTML = '<option value="">-- Chọn chi nhánh --</option>' + data.nqt_du_lieu.map(b => `<option value="${b.g6_ma_chi_nhanh}">${b.g6_ten_chi_nhanh}</option>`).join('');
    }
}

async function nqtTaiDuLieu() {
    const cfg = nqtTabConfig[nqtTabHienTai];
    const q = document.getElementById('nqtTimKiem')?.value.trim() || '';
    const url = `${cfg.api}?g6_trang=${nqtTrang}&g6_gioi_han=15${q ? '&g6_tim_kiem='+encodeURIComponent(q) : ''}`;
    const tbody = document.getElementById('nqtTableBody');
    tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-sm text-[#666] dark:text-[#888]"><i class="fas fa-circle-notch fa-spin mr-2"></i>Đang tải...</td></tr>`;
    const res = await nqtApi.fetch(url);
    if (!res?.nqt_thanh_cong) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-sm text-[#dc2626]">Không thể tải dữ liệu</td></tr>`;
        return;
    }
    const data = res.nqt_du_lieu;
    const list = data.g6_danh_sach || data.nxv_danh_sach || data || [];
    if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-sm text-[#666] dark:text-[#888]">Không có dữ liệu</td></tr>`;
        return;
    }
    tbody.innerHTML = list.map(r => nqtRenderRow(r)).join('');
    const tong = data.g6_tong || data.nxv_tong || list.length;
    nqtHienThiPagination(tong);
}

function nqtRenderRow(r) {
    const badge = (v, on='Hoạt động', off='Tạm ngừng') => v
        ? `<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-[#dcfce7] dark:bg-[#16a34a]/20 text-[#16a34a]">${on}</span>`
        : `<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-[#f5f5f5] dark:bg-[#333] text-[#666] dark:text-[#888]">${off}</span>`;
    const fmt = n => n != null ? Number(n).toLocaleString('vi-VN') : '—';
    const t = nqtTabHienTai;
    if (t === 'hlv') {
        const hlvId = r.nxv_ma_hlv||r.g6_ma_hlv;
        const isChecked = nqtDaChon.includes(hlvId);
        return `<tr data-row-id="${hlvId}" class="cursor-pointer transition-colors ${isChecked ? 'nqt-row-selected' : 'hover:bg-[#fafafa] dark:hover:bg-[#1a1a1a]'}" onclick="nqtToggleRow(${hlvId}, event)">
        <td class="px-4 py-3"><div class="flex items-center gap-3">${nqtAvatarHtml(r.g6_ho_ten,32)}<div><p class="font-medium text-[#191919] dark:text-[#fafafa] text-sm">${r.g6_ho_ten||'—'}</p><p class="text-xs text-[#666] dark:text-[#888]">${r.g6_email||''}</p></div></div></td>
        <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_chuyen_mon||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_so_dien_thoai||'—'}</td>
        <td class="px-4 py-3 text-center text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_so_nam_kinh_nghiem||r.g6_nam_kinh_nghiem||0} năm</td>
        <td class="px-4 py-3 text-center">${badge(r.g6_la_hoat_dong ?? r.g6_la_hien_thi_web)}</td>
        <td class="px-4 py-3 text-right"><button onclick="nqtSuaHLV(${JSON.stringify(r).replace(/"/g,'&quot;')})" class="text-xs px-2 py-1 rounded border border-[#e5e5e5] dark:border-[#404040] hover:bg-[#f5f5f5] dark:hover:bg-[#333] text-[#666] dark:text-[#888] mr-1">Sửa</button>
        <button onclick="nqtXoaHLV(${hlvId})" class="text-xs px-2 py-1 rounded border border-[#fecaca] dark:border-[#7f1d1d] text-[#dc2626] hover:bg-[#fef2f2] dark:hover:bg-[#7f1d1d]/20">Xoá</button></td></tr>`;
    }
    if (t === 'goipt') return `<tr class="hover:bg-[#fafafa] dark:hover:bg-[#1a1a1a]">
        <td class="px-4 py-3 font-medium text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten_goi||'—'}</td>
        <td class="px-4 py-3 text-center text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_so_buoi||0}</td>
        <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${fmt(r.g6_gia)}</td>
        <td class="px-4 py-3 text-center text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_hieu_luc_ngay||'—'}</td>
        <td class="px-4 py-3 text-center">${badge(r.g6_la_hoat_dong)}</td>
        <td class="px-4 py-3 text-right"><button onclick="nqtXoaGoiPT(${r.nxv_ma_goi||r.g6_ma_goi_pt})" class="text-xs px-2 py-1 rounded border border-[#fecaca] dark:border-[#7f1d1d] text-[#dc2626] hover:bg-[#fef2f2] dark:hover:bg-[#7f1d1d]/20">Xoá</button></td></tr>`;
    if (t === 'dangky') return `<tr class="hover:bg-[#fafafa] dark:hover:bg-[#1a1a1a]">
        <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten_hoi_vien||r.g6_ma_nguoi_dung||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten_hlv||r.g6_ma_hlv||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ten_goi||r.g6_ma_goi_pt||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ngay_mua?.slice(0,10)||'—'}</td>
        <td class="px-4 py-3 text-center text-sm font-medium text-[#191919] dark:text-[#fafafa]">${r.g6_so_buoi_con_lai??'—'}</td>
        <td class="px-4 py-3 text-right"><button onclick="nqtXoa(${r.nxv_ma_dang_ky||r.g6_ma_dang_ky_pt},'nxv-dang-ky-pt')" class="text-xs px-2 py-1 rounded border border-[#fecaca] dark:border-[#7f1d1d] text-[#dc2626] hover:bg-[#fef2f2] dark:hover:bg-[#7f1d1d]/20">Xoá</button></td></tr>`;
    // buoitap
    const trangThaiBuoi = {'cho_xac_nhan':'Chờ xác nhận','da_xac_nhan':'Đã xác nhận','hoan_thanh':'Hoàn thành','huy':'Đã huỷ'};
    return `<tr class="hover:bg-[#fafafa] dark:hover:bg-[#1a1a1a]">
        <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten_hoi_vien||r.g6_ma_nguoi_dung||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten_hlv||r.g6_ma_hlv||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ngay_tap?.slice(0,10)||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ngay_tap?.slice(11,16)||'—'}</td>
        <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${trangThaiBuoi[r.g6_trang_thai]||r.g6_trang_thai||'—'}</td>
        <td class="px-4 py-3 text-right"><button onclick="nqtXoa(${r.nxv_ma_buoi||r.g6_ma_buoi_tap},'nxv-buoi-tap-pt')" class="text-xs px-2 py-1 rounded border border-[#fecaca] dark:border-[#7f1d1d] text-[#dc2626] hover:bg-[#fef2f2] dark:hover:bg-[#7f1d1d]/20">Xoá</button></td></tr>`;
}

function nqtHienThiPagination(tong) {
    const perPage = 15;
    const totalPages = Math.ceil(tong / perPage);
    const pag = document.getElementById('nqtPagination');
    document.getElementById('nqtPagInfo').textContent = `${tong} kết quả`;
    if (totalPages <= 1) { pag.classList.add('hidden'); return; }
    pag.classList.remove('hidden');
    let html = '';
    for (let i = 1; i <= Math.min(totalPages, 7); i++) {
        html += `<button onclick="nqtTrang=${i};nqtTaiDuLieu()" class="px-2.5 py-1 text-xs rounded border ${i===nqtTrang ? 'bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] border-[#191919] dark:border-[#fafafa]' : 'border-[#e5e5e5] dark:border-[#404040] text-[#666] dark:text-[#888] hover:bg-[#f5f5f5] dark:hover:bg-[#333]'}">${i}</button>`;
    }
    document.getElementById('nqtPagButtons').innerHTML = html;
}

function nqtXuLyTimKiem() {
    clearTimeout(nqtTimKiemTimer);
    nqtTimKiemTimer = setTimeout(() => { nqtTrang = 1; nqtTaiDuLieu(); }, 400);
}

function nqtSuaHLV(r) {
    document.getElementById('nqtModalTitle').textContent = 'Cập nhật huấn luyện viên';
    document.getElementById('nqtHLVId').value = r.nxv_ma_hlv || r.g6_ma_hlv || '';
    document.getElementById('nqtHoTen').value = r.g6_ho_ten || '';
    document.getElementById('nqtSoDienThoai').value = r.g6_so_dien_thoai || '';
    document.getElementById('nqtChiNhanh').value = r.g6_ma_chi_nhanh || '';
    document.getElementById('nqtChuyenMon').value = r.g6_chuyen_mon || '';
    document.getElementById('nqtNamKinhNghiem').value = r.g6_so_nam_kinh_nghiem || r.g6_nam_kinh_nghiem || '';
    document.getElementById('nqtLuong').value = r.g6_gia_theo_buoi || r.g6_luong_buoi || '';
    document.getElementById('nqtGioiThieu').value = r.g6_tieu_su || r.g6_gioi_thieu || '';
    nqtMoModal('nqtModalThemHLV');
}

async function nqtLuuHLV(e) {
    e.preventDefault();
    const id = document.getElementById('nqtHLVId').value;
    const btn = document.getElementById('nqtBtnLuu');
    const nqtRestore = nqtBtnLoading(btn, 'Đang lưu...');
    const payload = {
        g6_ho_ten: document.getElementById('nqtHoTen').value.trim(),
        g6_so_dien_thoai: document.getElementById('nqtSoDienThoai').value.trim(),
        g6_ma_chi_nhanh: parseInt(document.getElementById('nqtChiNhanh').value),
        g6_chuyen_mon: document.getElementById('nqtChuyenMon').value.trim(),
        g6_so_nam_kinh_nghiem: parseInt(document.getElementById('nqtNamKinhNghiem').value) || 0,
        g6_gia_theo_buoi: parseFloat(document.getElementById('nqtLuong').value) || 0,
        g6_tieu_su: document.getElementById('nqtGioiThieu').value.trim(),
    };
    const res = await nqtApi.fetch(id ? `/api/nxv-hlv/${id}` : '/api/nxv-hlv', {
        method: id ? 'PUT' : 'POST', body: payload
    });
    nqtRestore();
    if (res?.nqt_thanh_cong) {
        nqtToast(id ? 'Cập nhật thành công' : 'Thêm HLV thành công');
        nqtDongModal('nqtModalThemHLV');
        e.target.reset();
        document.getElementById('nqtHLVId').value = '';
        document.getElementById('nqtModalTitle').textContent = 'Thêm huấn luyện viên';
        nqtTaiDuLieu();
    } else {
        nqtToast(res?.nqt_thong_diep || 'Có lỗi xảy ra', 'error');
    }
}

async function nqtXoaHLV(id) {
    if (!confirm('Xoá huấn luyện viên này?')) return;
    const res = await nqtApi.fetch(`/api/nxv-hlv/${id}`, { method: 'DELETE' });
    res?.nqt_thanh_cong ? (nqtToast('Đã xoá'), nqtTaiDuLieu()) : nqtToast(res?.nqt_thong_diep||'Lỗi','error');
}

async function nqtXoaGoiPT(id) {
    if (!confirm('Xoá gói PT này?')) return;
    const res = await nqtApi.fetch(`/api/nxv-goi-pt/${id}`, { method: 'DELETE' });
    res?.nqt_thanh_cong ? (nqtToast('Đã xoá'), nqtTaiDuLieu()) : nqtToast(res?.nqt_thong_diep||'Lỗi','error');
}

async function nqtXoa(id, api) {
    if (!confirm('Xoá bản ghi này?')) return;
    const res = await nqtApi.fetch(`/api/${api}/${id}`, { method: 'DELETE' });
    res?.nqt_thanh_cong ? (nqtToast('Đã xoá'), nqtTaiDuLieu()) : nqtToast(res?.nqt_thong_diep||'Lỗi','error');
}

// expose for inline onclick handlers
window.nqtChuyenTab = nqtChuyenTab;
window.nqtTaiDuLieu = nqtTaiDuLieu;
window.nqtXuLyTimKiem = nqtXuLyTimKiem;
window.nqtSuaHLV = nqtSuaHLV;
window.nqtLuuHLV = nqtLuuHLV;
window.nqtXoaHLV = nqtXoaHLV;
window.nqtXoaGoiPT = nqtXoaGoiPT;
window.nqtXoa = nqtXoa;

nqtLoadBranches();
nqtRenderHead();
nqtTaiDuLieu();
</script>
</body>
</html>
