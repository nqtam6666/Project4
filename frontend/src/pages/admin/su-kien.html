<!doctype html>
<html id="nqtHtmlRoot" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sự kiện</title>
    <script>
      if (localStorage.getItem("nqt_dark_mode") === "true") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#f5f5f5] dark:bg-[#1a1a1a]">
    <div id="nqt-page-content" style="display: none" class="space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-lg font-semibold text-[#191919] dark:text-[#fafafa]">
            Sự kiện
          </h1>
          <p class="text-sm text-[#666] dark:text-[#888]">
            Quản lý sự kiện và đăng ký tham dự
          </p>
        </div>
        <button id="nqtBtnThem"
          onclick="nqtMoModal('nqtModalThemSK')"
          class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors"
        >
          <i class="fas fa-plus"></i>Thêm sự kiện
        </button>
      </div>

      <!-- Tabs -->
      <div
        class="flex space-x-1 border-b border-[#e5e5e5] dark:border-[#404040]"
      >
        <button
          onclick="nqtChuyenTab('sukien')"
          id="nqtTabSukien"
          class="px-4 py-2 text-sm font-medium border-b-2 border-[#191919] dark:border-[#fafafa] text-[#191919] dark:text-[#fafafa] -mb-px"
        >
          Sự kiện
        </button>
        <button
          onclick="nqtChuyenTab('dangky')"
          id="nqtTabDangky"
          class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-[#666] dark:text-[#888] hover:text-[#191919] dark:hover:text-[#fafafa] -mb-px"
        >
          Đăng ký
        </button>
      </div>

      <!-- Table -->
      <div
        class="bg-white dark:bg-[#262626] border border-[#e5e5e5] dark:border-[#404040] rounded-md overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead
              id="nqtTableHead"
              class="bg-[#fafafa] dark:bg-[#333] border-b border-[#e5e5e5] dark:border-[#404040]"
            ></thead>
            <tbody
              id="nqtTableBody"
              class="divide-y divide-[#e5e5e5] dark:divide-[#404040]"
            >
              <tr>
                <td
                  colspan="6"
                  class="px-4 py-8 text-center text-sm text-[#666] dark:text-[#888]"
                >
                  <i class="fas fa-circle-notch fa-spin mr-2"></i>Đang tải...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Bulk Action Bar -->
    <div id="nqtBulkBar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-40">
        <div class="bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] px-4 py-2.5 rounded-md shadow-lg flex items-center space-x-3">
            <span class="text-sm">Đã chọn <strong id="nqtSoDaChon">0</strong> mục</span>
            <div class="w-px h-5 bg-white/20 dark:bg-[#191919]/20"></div>
            <button onclick="nqtMoBulkModal(true)" class="px-3 py-1.5 bg-[#16a34a] hover:bg-[#15803d] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
                <i class="fas fa-check-circle"></i><span>Hoạt động</span>
            </button>
            <button onclick="nqtMoBulkModal(false)" class="px-3 py-1.5 bg-[#d97706] hover:bg-[#b45309] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
                <i class="fas fa-eye-slash"></i><span>Tạm ngừng</span>
            </button>
            <button onclick="nqtMoBulkModal('delete')" class="px-3 py-1.5 bg-[#dc2626] hover:bg-[#b91c1c] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
                <i class="fas fa-trash-can"></i><span>Xoá</span>
            </button>
            <button onclick="nqtBoChonTatCa()" class="p-1.5 hover:bg-white/10 dark:hover:bg-[#191919]/10 rounded-md transition-colors" title="Bỏ chọn">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Modal: Bulk Action -->
    <div id="modalBulkAction" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) nqtDongModal('modalBulkAction')">
        <div class="bg-white dark:bg-[#262626] rounded-md w-full max-w-sm shadow-lg">
            <div class="px-4 py-3 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between">
                <h3 class="font-semibold text-[#191919] dark:text-[#fafafa]" id="nqtBulkTitle">Thao tác hàng loạt</h3>
                <button onclick="nqtDongModal('modalBulkAction')" class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 text-center">
                <div class="w-12 h-12 mx-auto mb-4 bg-[#f5f5f5] dark:bg-[#404040] rounded-full flex items-center justify-center">
                    <i class="fas fa-calendar-star text-[#525252] dark:text-[#a3a3a3] text-xl" id="nqtBulkIcon"></i>
                </div>
                <p class="text-sm text-[#666] dark:text-[#888] mb-1">Bạn đang thực hiện thao tác cho</p>
                <p class="text-xl font-semibold text-[#191919] dark:text-[#fafafa]"><span id="nqtBulkCount">0</span> mục</p>
                <p class="text-xs text-[#a3a3a3] dark:text-[#666] mt-2" id="nqtBulkMessage">Trạng thái sẽ được cập nhật.</p>
            </div>
            <div class="px-4 py-3 border-t border-[#e5e5e5] dark:border-[#404040] flex justify-end space-x-2">
                <button onclick="nqtDongModal('modalBulkAction')" class="px-4 py-2 text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]">Hủy</button>
                <button onclick="nqtXacNhanBulkAction()" id="nqtBulkConfirmBtn" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919]">Xác nhận</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Sự kiện -->
    <div
      id="nqtModalThemSK"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
      onclick="if (event.target === this) nqtDongModal('nqtModalThemSK');"
    >
      <div
        class="bg-white dark:bg-[#262626] rounded-lg w-full max-w-lg border border-[#e5e5e5] dark:border-[#404040]"
      >
        <div
          class="px-6 py-4 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between"
        >
          <h3 class="text-sm font-semibold text-[#191919] dark:text-[#fafafa]">
            Thêm sự kiện
          </h3>
          <button
            onclick="nqtDongModal('nqtModalThemSK')"
            class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="nqtFormSK" onsubmit="nqtLuuSK(event)" class="p-6 space-y-4">
          <input type="hidden" id="nqtSKId" />
          <div>
            <label
              class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1"
              >Tên sự kiện *</label
            >
            <input
              type="text"
              id="nqtTenSK"
              required
              placeholder="Giải vô địch Gym 2026"
              class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"
            />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1"
                >Ngày bắt đầu</label
              >
              <input
                type="datetime-local"
                id="nqtNgayBDSK"
                class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"
              />
            </div>
            <div>
              <label
                class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1"
                >Ngày kết thúc</label
              >
              <input
                type="datetime-local"
                id="nqtNgayKTSK"
                class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"
              />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1"
                >Địa điểm</label
              >
              <input
                type="text"
                id="nqtDiaDiem"
                placeholder="Hội trường tầng 2"
                class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"
              />
            </div>
            <div>
              <label
                class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1"
                >Sức chứa tối đa</label
              >
              <input
                type="number"
                id="nqtSucChuaSK"
                min="1"
                placeholder="100"
                class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-xs font-medium text-[#666] dark:text-[#888] mb-1"
              >Mô tả</label
            >
            <textarea
              id="nqtMoTaSK"
              rows="2"
              placeholder="Mô tả sự kiện..."
              class="w-full px-3 py-2 text-sm bg-white dark:bg-[#1a1a1a] border border-[#e5e5e5] dark:border-[#404040] rounded-md focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] text-[#191919] dark:text-[#fafafa]"
            ></textarea>
          </div>
          <div class="flex justify-end gap-3 pt-2">
            <button
              type="button"
              onclick="nqtDongModal('nqtModalThemSK')"
              class="px-4 py-2 text-sm border border-[#e5e5e5] dark:border-[#404040] text-[#666] dark:text-[#888] rounded-md hover:bg-[#f5f5f5] dark:hover:bg-[#333]"
            >
              Huỷ
            </button>
            <button
              type="submit"
              id="nqtBtnLuuSK"
              class="px-4 py-2 text-sm bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5]"
            >
              Lưu
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module">
      import { nqtInitAdminLayout } from "../../js/admin/nqtAdminLayout.js";
      nqtInitAdminLayout("su-kien");

      let nqtTabHienTai = "sukien";
      let nqtDaChon = [];
      let nqtBulkActionType = null;

      window.nqtToggleRow = function(id, e) {
          if (e.target.closest('button') || e.target.closest('a')) return;
          const idx = nqtDaChon.indexOf(id);
          if (idx === -1) nqtDaChon.push(id);
          else nqtDaChon.splice(idx, 1);
          nqtCapNhatBulkBar();
          document.querySelectorAll('[data-row-id]').forEach(tr => {
              const trId = parseInt(tr.dataset.rowId);
              const sel = nqtDaChon.includes(trId);
              if (sel) {
                  tr.classList.remove('hover:bg-[#fafafa]', 'dark:hover:bg-[#1a1a1a]');
                  tr.classList.add('nqt-row-selected');
              } else {
                  tr.classList.remove('nqt-row-selected');
                  tr.classList.add('hover:bg-[#fafafa]', 'dark:hover:bg-[#1a1a1a]');
              }
          });
      };

      window.nqtBoChonTatCa = function() {
          nqtDaChon = [];
          document.querySelectorAll('[data-row-id]').forEach(tr => {
              tr.classList.remove('nqt-row-selected');
              tr.classList.add('hover:bg-[#fafafa]', 'dark:hover:bg-[#1a1a1a]');
          });
          nqtCapNhatBulkBar();
      };

      function nqtCapNhatBulkBar() {
          const bar = document.getElementById('nqtBulkBar');
          document.getElementById('nqtSoDaChon').textContent = nqtDaChon.length;
          if (nqtDaChon.length > 0) bar.classList.remove('hidden');
          else bar.classList.add('hidden');
      }

      window.nqtMoBulkModal = function(action) {
          nqtBulkActionType = action;
          document.getElementById('nqtBulkCount').textContent = nqtDaChon.length;
          
          if (action === 'delete') {
              document.getElementById('nqtBulkTitle').textContent = `Xoá mục đã chọn`;
              document.getElementById('nqtBulkMessage').textContent = `Dữ liệu sẽ bị xoá hoặc ẩn đi tuỳ loại bản ghi.`;
              document.getElementById('nqtBulkConfirmBtn').className = "inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#dc2626] text-white text-sm font-medium rounded-md hover:bg-[#b91c1c]";
          } else {
              const nqtLabels = { true: 'Hoạt động', false: 'Tạm ngừng' };
              document.getElementById('nqtBulkTitle').textContent = `Cập nhật sang ${nqtLabels[action]}`;
              document.getElementById('nqtBulkMessage').textContent = `Trạng thái sẽ được cập nhật.`;
              document.getElementById('nqtBulkConfirmBtn').className = "inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5]";
          }
          nqtMoModal('modalBulkAction');
      }

      window.nqtXacNhanBulkAction = async function() {
          if (nqtDaChon.length === 0) return;
          const btn = document.getElementById('nqtBulkConfirmBtn');
          const nqtRestoreBulk = nqtBtnLoading(btn, 'Đang xử lý...');

          const apiBase = nqtTabCfg[nqtTabHienTai].api;

          let nqtThanhCong = 0, nqtThatBai = 0;
          for (const id of nqtDaChon) {
              let res;
              if (nqtBulkActionType === 'delete') {
                  res = await nqtApi.fetch(`${apiBase}/${id}`, { method: 'DELETE' });
              } else {
                  // Some APIs might not support this PUT, but we try gracefully
                  res = await nqtApi.fetch(`${apiBase}/${id}`, { method: 'PUT', body: { g6_la_hoat_dong: nqtBulkActionType } });
              }
              if (res && res.nqt_thanh_cong) nqtThanhCong++;
              else nqtThatBai++;
          }

          nqtRestoreBulk();
          nqtDongModal('modalBulkAction');
          nqtBoChonTatCa();
          nqtTaiDuLieu();

          if (nqtThatBai === 0) nqtToast(`Đã xử lý ${nqtThanhCong} mục!`, 'success');
          else nqtToast(`Thành công: ${nqtThanhCong}, Thất bại: ${nqtThatBai}`, 'warn');
      }

      const nqtTabCfg = {
        sukien: {
          api: "/api/nxv-su-kien",
          cols: [
            "Tên sự kiện",
            "Ngày bắt đầu",
            "Địa điểm",
            "Đã đăng ký",
            "Trạng thái",
            "Thao tác",
          ],
        },
        dangky: {
          api: "/api/nxv-dang-ky-su-kien",
          cols: [
            "Người đăng ký",
            "Sự kiện",
            "Ngày đăng ký",
            "Trạng thái",
            "Thao tác",
          ],
        },
      };

      window.nqtChuyenTab = function (tab) {
        nqtTabHienTai = tab;
        nqtBoChonTatCa();
        document
          .querySelectorAll("[id^=nqtTab]")
          .forEach(
            (b) =>
              (b.className =
                "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-[#666] dark:text-[#888] hover:text-[#191919] dark:hover:text-[#fafafa] -mb-px"),
          );
        const map = { sukien: "Sukien", dangky: "Dangky" };
        const btn = document.getElementById("nqtTab" + map[tab]);
        if (btn)
          btn.className =
            "px-4 py-2 text-sm font-medium border-b-2 border-[#191919] dark:border-[#fafafa] text-[#191919] dark:text-[#fafafa] -mb-px";
        const btnThem = document.getElementById("nqtBtnThem");
        if (btnThem) btnThem.style.display = tab === "sukien" ? "inline-flex" : "none";
        nqtRenderHead();
        nqtTaiDuLieu();
      };

      function nqtRenderHead() {
        document.getElementById("nqtTableHead").innerHTML =
          `<tr>${nqtTabCfg[nqtTabHienTai].cols.map((c) => `<th class="px-4 py-3 text-left text-xs font-medium text-[#666] dark:text-[#888] uppercase">${c}</th>`).join("")}</tr>`;
      }

      async function nqtTaiDuLieu() {
        const cfg = nqtTabCfg[nqtTabHienTai];
        const tbody = document.getElementById("nqtTableBody");
        const nc = cfg.cols.length;
        tbody.innerHTML = `<tr><td colspan="${nc}" class="px-4 py-8 text-center text-sm text-[#666] dark:text-[#888]"><i class="fas fa-circle-notch fa-spin mr-2"></i>Đang tải...</td></tr>`;
        const res = await nqtApi.fetch(cfg.api);
        if (!res?.nqt_thanh_cong) {
          tbody.innerHTML = `<tr><td colspan="${nc}" class="px-4 py-8 text-center text-sm text-[#dc2626]">Không thể tải dữ liệu</td></tr>`;
          return;
        }
        const list =
          res.nqt_du_lieu?.nxv_danh_sach ||
          res.nqt_du_lieu?.g6_danh_sach ||
          res.nqt_du_lieu ||
          [];
        if (!list.length) {
          tbody.innerHTML = `<tr><td colspan="${nc}" class="px-4 py-8 text-center text-sm text-[#666] dark:text-[#888]">Không có sự kiện nào</td></tr>`;
          return;
        }
        tbody.innerHTML = list.map((r) => nqtRenderRow(r)).join("");
      }

      function nqtRenderRow(r) {
        const editBtn = (onclick) =>
          `<button onclick="${onclick}" class="nqt-action-btn nqt-action-edit inline-flex items-center justify-center w-[34px] h-[34px] rounded-lg text-sm transition-all duration-200" title="Sửa"><i class="fas fa-pen-to-square"></i></button>`;
        const delBtn = (id, api) =>
          `<button onclick="nqtXoa(${id},'${api}')" class="nqt-action-btn nqt-action-delete inline-flex items-center justify-center w-[34px] h-[34px] rounded-lg text-sm transition-all duration-200" title="Xoá"><i class="fas fa-trash-can"></i></button>`;
        const trangThai = {
          sap_dien_ra:
            '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-[#dbeafe] dark:bg-[#1e40af]/20 text-[#2563eb]"><span class="w-1.5 h-1.5 rounded-full bg-[#2563eb]"></span>Sắp diễn ra</span>',
          dang_dien_ra:
            '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-[#dcfce7] dark:bg-[#16a34a]/20 text-[#16a34a]"><span class="w-1.5 h-1.5 rounded-full bg-[#16a34a] animate-pulse"></span>Đang diễn ra</span>',
          da_ket_thuc:
            '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-[#f5f5f5] dark:bg-[#333] text-[#666] dark:text-[#888]">Đã kết thúc</span>',
          huy: '<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-[#fef2f2] dark:bg-[#7f1d1d]/20 text-[#dc2626]">Đã huỷ</span>',
        };

        let rowId = r.nxv_ma_su_kien || r.g6_ma_su_kien;
        if (nqtTabHienTai === "dangky") rowId = r.nxv_ma_dang_ky || r.g6_ma_dang_ky;

        const isChecked = nqtDaChon.includes(rowId);
        const rowCls = `cursor-pointer transition-colors ${isChecked ? 'nqt-row-selected' : 'hover:bg-[#fafafa] dark:hover:bg-[#1a1a1a]'}`;

        if (nqtTabHienTai === "sukien") {
          return `<tr data-row-id="${rowId}" class="${rowCls}" onclick="nqtToggleRow(${rowId}, event)">
            <td class="px-4 py-3"><p class="font-medium text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten || r.nxv_ten || "—"}</p><p class="text-xs text-[#666] dark:text-[#888] mt-0.5">${r.g6_mo_ta || r.nxv_mo_ta || ""}</p></td>
            <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ngay_bat_dau?.slice(0, 16).replace("T", " ") || r.nxv_ngay_bat_dau?.slice(0, 16).replace("T", " ") || "—"}</td>
            <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_dia_diem || r.nxv_dia_diem || "—"}</td>
            <td class="px-4 py-3 text-center text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_so_luong_dang_ky || r.nxv_so_luong_dang_ky || 0}/${r.g6_suc_chua_toi_da || r.nxv_suc_chua || "∞"}</td>
            <td class="px-4 py-3">${trangThai[r.g6_trang_thai] || trangThai[r.nxv_trang_thai] || r.g6_trang_thai || r.nxv_trang_thai || "—"}</td>
            <td class="px-4 py-3 text-right"><div class="inline-flex items-center gap-1">${editBtn(`nqtSuaSK(${JSON.stringify(r).replace(/"/g,'&quot;')})`)}${delBtn(rowId, "nxv-su-kien")}</div></td></tr>`;
        }
        return `<tr data-row-id="${rowId}" class="${rowCls}" onclick="nqtToggleRow(${rowId}, event)">
            <td class="px-4 py-3 text-sm text-[#191919] dark:text-[#fafafa]">${r.g6_ten_nguoi_dung || r.g6_ma_nguoi_dung || "—"}</td>
            <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ten_su_kien || r.nxv_ma_su_kien || "—"}</td>
            <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_ngay_tao?.slice(0, 10) || "—"}</td>
            <td class="px-4 py-3 text-sm text-[#666] dark:text-[#888]">${r.g6_trang_thai || "—"}</td>
            <td class="px-4 py-3 text-right">${delBtn(rowId, "nxv-dang-ky-su-kien")}</td></tr>`;
      }
      window.nqtSuaSK = function(r) {
        document.getElementById("nqtSKId").value = r.nxv_ma_su_kien || r.g6_ma_su_kien || "";
        document.getElementById("nqtTenSK").value = r.nxv_ten || r.g6_ten || "";
        document.getElementById("nqtNgayBDSK").value = r.nxv_ngay_bat_dau ? r.nxv_ngay_bat_dau.slice(0, 16) : r.g6_ngay_bat_dau ? r.g6_ngay_bat_dau.slice(0, 16) : "";
        document.getElementById("nqtNgayKTSK").value = r.nxv_ngay_ket_thuc ? r.nxv_ngay_ket_thuc.slice(0, 16) : r.g6_ngay_ket_thuc ? r.g6_ngay_ket_thuc.slice(0, 16) : "";
        document.getElementById("nqtDiaDiem").value = r.nxv_dia_diem || r.g6_dia_diem || "";
        document.getElementById("nqtSucChuaSK").value = r.nxv_suc_chua || r.g6_suc_chua_toi_da || "";
        document.getElementById("nqtMoTaSK").value = r.nxv_mo_ta || r.g6_mo_ta || "";
        nqtMoModal("nqtModalThemSK");
      };
      window.nqtLuuSK = async function (e) {
        e.preventDefault();
        const id = document.getElementById("nqtSKId").value;
        const btn = document.getElementById("nqtBtnLuuSK");
        const nqtRestore = nqtBtnLoading(btn, "Đang lưu...");
        const payload = {
          nxv_ten: document.getElementById("nqtTenSK").value.trim(),
          nxv_ngay_bat_dau: document.getElementById("nqtNgayBDSK").value || null,
          nxv_ngay_ket_thuc:
            document.getElementById("nqtNgayKTSK").value || null,
          nxv_dia_diem: document.getElementById("nqtDiaDiem").value.trim(),
          nxv_suc_chua:
            parseInt(document.getElementById("nqtSucChuaSK").value) || null,
          nxv_mo_ta: document.getElementById("nqtMoTaSK").value.trim(),
        };
        const res = await nqtApi.fetch(
          id ? `/api/nxv-su-kien/${id}` : "/api/nxv-su-kien",
          { method: id ? "PUT" : "POST", body: payload },
        );
        nqtRestore();
        if (res?.nqt_thanh_cong) {
          nqtToast("Lưu thành công");
          nqtDongModal("nqtModalThemSK");
          e.target.reset();
          document.getElementById("nqtSKId").value = "";
          nqtTaiDuLieu();
        } else nqtToast(res?.nqt_thong_diep || "Lỗi", "error");
      };

      window.nqtXoa = async function (id, api) {
        if (!confirm("Xoá bản ghi này?")) return;
        const res = await nqtApi.fetch(`/api/${api}/${id}`, {
          method: "DELETE",
        });
        res?.nqt_thanh_cong
          ? (nqtToast("Đã xoá"), nqtTaiDuLieu())
          : nqtToast(res?.nqt_thong_diep || "Lỗi", "error");
      };

      nqtRenderHead();
      nqtTaiDuLieu();
    </script>
  </body>
</html>
