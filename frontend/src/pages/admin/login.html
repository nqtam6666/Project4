<!DOCTYPE html>
<html lang="vi" id="nqtHtmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRONCORE GYM — Admin Portal</title>
    <meta name="description" content="Hệ thống quản trị IRONCORE GYM. Đăng nhập để quản lý phòng tập.">
    <script>document.documentElement.classList.add('dark');</script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep: #050507;
            --bg-surface: #0D0D10;
            --bg-card: #111116;
            --gold: #C9A84C;
            --gold-bright: #E5C76B;
            --gold-dim: rgba(201, 168, 76, 0.3);
            --text-primary: #F5F5F0;
            --text-secondary: #71717A;
            --text-muted: #3F3F46;
            --border: rgba(255,255,255,0.06);
            --border-gold: rgba(201,168,76,0.15);
            --gold-glow: rgba(201, 168, 76, 0.04);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ===== AMBIENT BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -30%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 60%);
            pointer-events: none;
            animation: ambientFloat 20s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -40%;
            left: -30%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 60%);
            pointer-events: none;
            animation: ambientFloat 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes ambientFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.1); }
        }

        /* ===== GRID PATTERN OVERLAY ===== */
        .grid-pattern {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        /* ===== BRAND ===== */
        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--gold-dim), 0 8px 32px rgba(0,0,0,0.4);
            position: relative;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 19px;
            background: linear-gradient(135deg, var(--gold), transparent 60%);
            z-index: -1;
            opacity: 0.3;
        }
        .brand-icon i {
            font-size: 22px;
            color: #0A0A0A;
        }
        .brand-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            line-height: 1;
        }
        .brand-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            font-style: italic;
        }

        /* ===== CARD ===== */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
        }

        .card-header {
            margin-bottom: 28px;
        }
        .card-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .card-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .form-input-wrapper {
            position: relative;
        }
        .form-input-wrapper i.input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.3s ease;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }
        .form-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow), 0 0 20px var(--gold-glow);
        }
        .form-input:focus + .input-icon,
        .form-input:focus ~ i.input-icon {
            color: var(--gold);
        }
        .form-input-wrapper:focus-within i.input-icon {
            color: var(--gold);
        }

        /* ===== PASSWORD TOGGLE ===== */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }
        .password-toggle:hover {
            color: var(--text-secondary);
        }

        /* ===== ERROR ===== */
        .error-box {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.15);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #f87171;
            animation: shakeError 0.4s ease;
        }
        .error-box.visible { display: flex; }
        .error-box i { font-size: 16px; flex-shrink: 0; }

        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #0A0A0A;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px var(--gold-dim);
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px var(--gold-dim), 0 0 60px var(--gold-dim);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        .submit-btn:hover::after {
            transform: translateX(100%);
        }

        /* ===== FOOTER ===== */
        .login-footer {
            text-align: center;
            margin-top: 32px;
        }
        .login-footer p {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .login-footer .version {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            background: var(--gold-glow);
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            font-size: 10px;
            color: var(--gold-dim);
            letter-spacing: 1px;
        }

        /* ===== DECORATIVE CORNER ===== */
        .corner-decor {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1;
        }
        .corner-decor.top-left {
            top: 0; left: 0;
            border-top: 1px solid var(--border-gold);
            border-left: 1px solid var(--border-gold);
        }
        .corner-decor.bottom-right {
            bottom: 0; right: 0;
            border-bottom: 1px solid var(--border-gold);
            border-right: 1px solid var(--border-gold);
        }

        /* ===== SPINNER ===== */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10,10,10,0.3);
            border-top-color: #0A0A0A;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-wrapper { padding: 16px; }
            .login-card { padding: 28px 24px; }
            .brand-title { font-size: 24px; letter-spacing: 4px; }
        }

        /* ===== SELECTION ===== */
        ::selection { background: rgba(201,168,76,0.3); color: #fff; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <!-- Grid Pattern -->
    <div class="grid-pattern"></div>

    <!-- Corner Decorations -->
    <div class="corner-decor top-left"></div>
    <div class="corner-decor bottom-right"></div>

    <!-- Login Container -->
    <div class="login-wrapper">

        <!-- Brand -->
        <div class="brand-section">
            <div class="brand-icon" id="nqtBrandIcon">
                <i class="fas fa-dumbbell"></i>
            </div>
            <h1 class="brand-title" id="nqtBrandTitle">IRONCORE</h1>
            <p class="brand-subtitle" id="nqtBrandSubtitle">Admin Control Panel</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="card-header">
                <h2>Đăng nhập hệ thống</h2>
                <p>Nhập thông tin quản trị viên để tiếp tục</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="nqtUsername">Tên đăng nhập</label>
                    <div class="form-input-wrapper">
                        <input type="text" 
                               id="nqtUsername" 
                               name="g6_ten_dang_nhap" 
                               class="form-input" 
                               placeholder="Nhập tên đăng nhập"
                               value="quangtam"
                               required 
                               autofocus>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="nqtPassword">Mật khẩu</label>
                    <div class="form-input-wrapper">
                        <input type="password" 
                               id="nqtPassword" 
                               name="g6_mat_khau" 
                               class="form-input" 
                               placeholder="••••••••"
                               value="123456"
                               required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="nqtTogglePassword" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Error -->
                <div class="error-box" id="nqtErrorBox">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="nqtErrorText">Sai thông tin đăng nhập</span>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn" id="nqtLoginBtn">
                    Đăng nhập
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>IRONCORE GYM Management</p>
            <span class="version">G6 v2.0</span>
        </div>
    </div>

    <script>
        // === Toast System for Login ===
        function nqtShowToast(message, type = 'success') {
            const container = document.getElementById('nqt-toast-container') || (() => {
                const c = document.createElement('div');
                c.id = 'nqt-toast-container';
                c.style.cssText = 'position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none;';
                document.body.appendChild(c);
                return c;
            })();
            
            const toast = document.createElement('div');
            const config = type === 'success' 
                ? { icon: 'fa-check-circle', color: '#C9A84C', bg: 'rgba(201,168,76,0.1)' }
                : { icon: 'fa-exclamation-circle', color: '#ef4444', bg: 'rgba(239,68,68,0.1)' };

            toast.style.cssText = 'pointer-events: auto; animation: nqtFadeIn 0.4s ease forwards;';
            toast.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px; padding: 16px 20px; background: rgba(20,23,32,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); min-width: 300px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: ${config.bg}; color: ${config.color}">
                        <i class="fas ${config.icon}"></i>
                    </div>
                    <div style="flex: 1; font-size: 14px; font-weight: 700; color: #F5F5F0;">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Add FadeIn animation
        const style = document.createElement('style');
        style.textContent = '@keyframes nqtFadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }';
        document.head.appendChild(style);

        // === Dynamic UI Loader ===
        async function nqtLoadDynamicUI() {
            try {
                const res = await fetch('/api/nqt-public/cau-hinh-ui');
                const data = await res.json();
                if (data.nqt_thanh_cong && data.nqt_du_lieu) {
                    const config = {};
                    data.nqt_du_lieu.forEach(item => {
                        config[item.g6_khoa] = item.g6_gia_tri;
                    });

                    // Apply Colors
                    if (config.g6_mau_chu_dao) {
                        const mainColor = config.g6_mau_chu_dao;
                        document.documentElement.style.setProperty('--gold', mainColor);
                        // Tính toán các màu phụ trợ từ màu chính (thêm alpha cho hex)
                        document.documentElement.style.setProperty('--gold-dim', mainColor + '4D'); // ~30%
                        document.documentElement.style.setProperty('--gold-glow', mainColor + '0A'); // ~4%
                        document.documentElement.style.setProperty('--border-gold', mainColor + '26'); // ~15%
                        
                        if (config.g6_mau_phu) document.documentElement.style.setProperty('--gold-bright', config.g6_mau_phu);
                    }

                    // Apply Texts
                    if (config.g6_ten_website) {
                        document.getElementById('nqtBrandTitle').textContent = config.g6_ten_website.toUpperCase();
                        document.title = `${config.g6_ten_website} — Admin Portal`;
                    }
                    if (config.g6_slogan) document.getElementById('nqtBrandSubtitle').textContent = config.g6_slogan;

                    // Apply Logo
                    if (config.g6_logo_url) {
                        const iconContainer = document.getElementById('nqtBrandIcon');
                        iconContainer.innerHTML = `<img src="${config.g6_logo_url}" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: inherit;">`;
                        iconContainer.style.background = 'transparent';
                        iconContainer.style.boxShadow = 'none';
                    }
                }
            } catch (err) { console.warn('Using defaults'); }
        }

        nqtLoadDynamicUI();

        if (localStorage.getItem('nqt_admin_token')) window.location.href = '/admin/dashboard';

        const toggleBtn = document.getElementById('nqtTogglePassword');
        const passwordInput = document.getElementById('nqtPassword');
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('nqtLoginBtn');
            btn.innerHTML = '<span class="spinner"></span>Đang xác thực...';
            btn.disabled = true;

            const payload = {
                g6_ten_dang_nhap: document.getElementById('nqtUsername').value.trim(),
                g6_mat_khau: document.getElementById('nqtPassword').value
            };

            try {
                const res = await fetch('/api/nqt-dang-nhap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.nqt_thanh_cong) {
                    nqtShowToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    btn.innerHTML = '<i class="fas fa-check" style="margin-right:8px"></i>Thành công';
                    btn.style.background = 'linear-gradient(135deg, #16a34a, #22c55e)';
                    setTimeout(() => window.location.href = '/admin/dashboard', 800);
                } else {
                    nqtShowToast(data.nqt_thong_diep || 'Sai tên đăng nhập hoặc mật khẩu', 'error');
                    btn.innerHTML = 'Đăng nhập';
                    btn.disabled = false;
                    btn.style.background = '';
                }
            } catch (err) {
                nqtShowToast('Không thể kết nối đến máy chủ', 'error');
                btn.innerHTML = 'Đăng nhập';
                btn.disabled = false;
                btn.style.background = '';
            }
        });
    </script>
</body>
</html>
