<!DOCTYPE html>
<html lang="vi" id="nqtHtmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gói tập - NQT Gym Admin</title>
    <script>if (localStorage.getItem('nqt_dark_mode') === 'true') { document.documentElement.classList.add('dark'); }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="nqt-page-content" style="display:none" class="space-y-4">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
            <h1 class="text-lg font-semibold text-[#191919] dark:text-[#fafafa]">Quản lý Gói tập</h1>
            <p class="text-sm text-[#666] dark:text-[#888]">Cấu hình các gói dịch vụ cho phòng tập</p>
        </div>
        <div class="flex items-center gap-3">
            <select id="nqtLocTrangThai" onchange="nqtLoadPackages()" class="flex h-9 items-center justify-between rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent pl-3 pr-8 py-1 text-sm shadow-sm focus:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                <option value="hoat_dong">Đang hoạt động</option>
                <option value="an">Bị ẩn</option>
                <option value="tat_ca">Tất cả</option>
            </select>
            <button onclick="nqtMoModal('modalAddPackage')" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919]">
                <i class="fas fa-plus"></i>Tạo gói mới
            </button>
        </div>
    </div>

    <!-- Package Grid -->
    <div id="packageGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div class="col-span-full py-12 text-center text-[#666] dark:text-[#888]">Đang tải...</div>
    </div>
</div>

<!-- Bulk Action Bar -->
<div id="nqtBulkBar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-40">
    <div class="bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] px-4 py-2.5 rounded-md shadow-lg flex items-center space-x-3">
        <span class="text-sm">Đã chọn <strong id="nqtSoDaChon">0</strong> gói tập</span>
        <div class="w-px h-5 bg-white/20 dark:bg-[#191919]/20"></div>
        <button onclick="nqtMoBulkModal(true)" class="px-3 py-1.5 bg-[#16a34a] hover:bg-[#15803d] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
            <i class="fas fa-check-circle"></i><span>Hoạt động</span>
        </button>
        <button onclick="nqtMoBulkModal(false)" class="px-3 py-1.5 bg-[#d97706] hover:bg-[#b45309] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
            <i class="fas fa-eye-slash"></i><span>Tạm ẩn</span>
        </button>
        <button onclick="nqtMoBulkModal('delete')" class="px-3 py-1.5 bg-[#dc2626] hover:bg-[#b91c1c] rounded-md text-sm font-medium transition-colors flex items-center space-x-1.5 text-white">
            <i class="fas fa-trash-can"></i><span>Xoá</span>
        </button>
        <button onclick="nqtBoChonTatCa()" class="p-1.5 hover:bg-white/10 dark:hover:bg-[#191919]/10 rounded-md transition-colors" title="Bỏ chọn">
            <i class="fas fa-times"></i>
        </button>
    </div>
</div>

<!-- Modal: Bulk Action -->
<div id="modalBulkAction" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) nqtDongModal('modalBulkAction')">
    <div class="bg-white dark:bg-[#262626] rounded-md w-full max-w-sm shadow-lg">
        <div class="px-4 py-3 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between">
            <h3 class="font-semibold text-[#191919] dark:text-[#fafafa]" id="nqtBulkTitle">Thao tác hàng loạt</h3>
            <button onclick="nqtDongModal('modalBulkAction')" class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 text-center">
            <div class="w-12 h-12 mx-auto mb-4 bg-[#f5f5f5] dark:bg-[#404040] rounded-full flex items-center justify-center">
                <i class="fas fa-dumbbell text-[#525252] dark:text-[#a3a3a3] text-xl" id="nqtBulkIcon"></i>
            </div>
            <p class="text-sm text-[#666] dark:text-[#888] mb-1">Bạn đang thực hiện thao tác cho</p>
            <p class="text-xl font-semibold text-[#191919] dark:text-[#fafafa]"><span id="nqtBulkCount">0</span> gói tập</p>
            <p class="text-xs text-[#a3a3a3] dark:text-[#666] mt-2" id="nqtBulkMessage">Trạng thái sẽ được cập nhật.</p>
        </div>
        <div class="px-4 py-3 border-t border-[#e5e5e5] dark:border-[#404040] flex justify-end space-x-2">
            <button onclick="nqtDongModal('modalBulkAction')" class="px-4 py-2 text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]">Hủy</button>
            <button onclick="nqtXacNhanBulkAction()" id="nqtBulkConfirmBtn" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919]">Xác nhận</button>
        </div>
    </div>
</div>

<!-- Modal: Add -->
<div id="modalAddPackage" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) nqtDongModal('modalAddPackage')">
    <div class="bg-white dark:bg-[#262626] rounded-md w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col">
        <div class="px-4 py-3 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between">
            <h3 class="font-semibold text-[#191919] dark:text-[#fafafa]">Tạo gói tập mới</h3>
            <button onclick="nqtDongModal('modalAddPackage')" class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"><i class="fas fa-times"></i></button>
        </div>
        <form id="formAddPackage" class="p-4 overflow-y-auto space-y-4">
            <div>
                <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Tên gói <span class="text-[#dc2626]">*</span></label>
                <input type="text" name="g6_ten_goi" required placeholder="Gói 3 tháng Gold" class="flex h-9 w-full rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-[#a3a3a3] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] disabled:cursor-not-allowed disabled:opacity-50 dark:text-[#fafafa]">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Giá (VND) <span class="text-[#dc2626]">*</span></label>
                    <input type="number" name="g6_gia" required value="0" class="flex h-9 w-full rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Số ngày <span class="text-[#dc2626]">*</span></label>
                    <input type="number" name="g6_so_ngay" required value="30" class="flex h-9 w-full rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Chi nhánh <span class="text-[#dc2626]">*</span></label>
                <select name="g6_ma_chi_nhanh" required id="selectBranchAddPkg" class="flex h-9 w-full items-center justify-between rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-2 text-sm shadow-sm focus:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                    <option value="">-- Chọn --</option>
                </select>
            </div>
            <label class="flex items-center space-x-2">
                <input type="checkbox" name="g6_co_pt" id="checkPT" class="w-4 h-4 rounded border-[#d4d4d4] text-[#191919]">
                <span class="text-sm text-[#191919] dark:text-[#fafafa]">Bao gồm PT</span>
            </label>
            <div class="flex justify-end space-x-2 pt-4 border-t border-[#e5e5e5] dark:border-[#404040]">
                <button type="button" onclick="nqtDongModal('modalAddPackage')" class="px-4 py-2 text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]">Hủy</button>
                <button type="submit" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919]">Lưu</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Edit -->
<div id="modalEditPackage" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) nqtDongModal('modalEditPackage')">
    <div class="bg-white dark:bg-[#262626] rounded-md w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col">
        <div class="px-4 py-3 border-b border-[#e5e5e5] dark:border-[#404040] flex items-center justify-between">
            <h3 class="font-semibold text-[#191919] dark:text-[#fafafa]">Chỉnh sửa gói tập</h3>
            <button onclick="nqtDongModal('modalEditPackage')" class="text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]"><i class="fas fa-times"></i></button>
        </div>
        <form id="formEditPackage" class="p-4 overflow-y-auto space-y-4">
            <input type="hidden" name="g6_ma_goi_tap">
            <div>
                <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Tên gói</label>
                <input type="text" name="g6_ten_goi" required class="flex h-9 w-full rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Giá (VND)</label>
                    <input type="number" name="g6_gia" required class="flex h-9 w-full rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Giá KM</label>
                    <input type="number" name="g6_gia_khuyen_mai" class="flex h-9 w-full rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Trạng thái</label>
                    <select name="g6_la_hoat_dong" class="flex h-9 w-full items-center rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-2 text-sm shadow-sm focus:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                        <option value="true">Hoạt động</option>
                        <option value="false">Tạm ẩn</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-[#191919] dark:text-[#fafafa] mb-1">Nổi bật</label>
                    <select name="g6_la_noi_bat" class="flex h-9 w-full items-center rounded-md border border-[#e5e5e5] dark:border-[#404040] bg-transparent px-3 py-2 text-sm shadow-sm focus:outline-none focus-visible:ring-1 focus-visible:ring-[#191919] dark:focus-visible:ring-[#fafafa] dark:text-[#fafafa]">
                        <option value="false">Không</option>
                        <option value="true">Có</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end space-x-2 pt-4 border-t border-[#e5e5e5] dark:border-[#404040]">
                <button type="button" onclick="nqtDongModal('modalEditPackage')" class="px-4 py-2 text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]">Hủy</button>
                <button type="submit" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5] transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#191919]">Cập nhật</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Delete -->
<div id="modalConfirmDeletePkg" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) nqtDongModal('modalConfirmDeletePkg')">
    <div class="bg-white dark:bg-[#262626] rounded-md w-full max-w-sm p-6 text-center">
        <div class="w-12 h-12 mx-auto mb-4 bg-[#fef2f2] dark:bg-[#451a1a] rounded-full flex items-center justify-center">
            <i class="fas fa-exclamation-triangle text-[#dc2626] text-xl"></i>
        </div>
        <h3 class="font-semibold text-[#191919] dark:text-[#fafafa] mb-2">Xác nhận ẩn</h3>
        <p class="text-sm text-[#666] dark:text-[#888] mb-1">Bạn có chắc muốn ẩn gói tập</p>
        <p class="font-semibold text-[#dc2626] mb-4" id="deletePkgTargetName"></p>
        <div class="flex justify-center space-x-2">
            <button onclick="nqtDongModal('modalConfirmDeletePkg')" class="px-4 py-2 text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa]">Hủy</button>
            <button onclick="nqtXacNhanXoaGoiTap()" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#dc2626] text-white text-sm font-medium rounded-md hover:bg-[#b91c1c] transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-[#dc2626]">Ẩn</button>
        </div>
    </div>
</div>

<script type="module">
import { nqtInitAdminLayout } from '/src/js/admin/nqtAdminLayout.js';
nqtInitAdminLayout('goi-tap');

(function() {
    let nqtAllPackages = [], nqtDeletePkgTargetId = null;
    let nqtDaChon = [];
    let nqtBulkActionType = null;

    window.nqtToggleRow = function(id, e) {
        if (e.target.closest('button') || e.target.closest('a')) return;
        const idx = nqtDaChon.indexOf(id);
        if (idx === -1) nqtDaChon.push(id);
        else nqtDaChon.splice(idx, 1);
        nqtCapNhatBulkBar();
        document.querySelectorAll('[data-row-id]').forEach(card => {
            const cardId = parseInt(card.dataset.rowId);
            const sel = nqtDaChon.includes(cardId);
            if (sel) {
                card.classList.add('ring-2', 'ring-[#191919]', 'dark:ring-[#fafafa]');
                card.classList.remove('border-[#e5e5e5]', 'dark:border-[#404040]');
            } else {
                card.classList.remove('ring-2', 'ring-[#191919]', 'dark:ring-[#fafafa]');
                card.classList.add('border-[#e5e5e5]', 'dark:border-[#404040]');
            }
        });
    };

    window.nqtBoChonTatCa = function() {
        nqtDaChon = [];
        document.querySelectorAll('[data-row-id]').forEach(card => {
            card.classList.remove('ring-2', 'ring-[#191919]', 'dark:ring-[#fafafa]');
            card.classList.add('border-[#e5e5e5]', 'dark:border-[#404040]');
        });
        nqtCapNhatBulkBar();
    };

    function nqtCapNhatBulkBar() {
        const bar = document.getElementById('nqtBulkBar');
        document.getElementById('nqtSoDaChon').textContent = nqtDaChon.length;
        if (nqtDaChon.length > 0) bar.classList.remove('hidden');
        else bar.classList.add('hidden');
    }

    window.nqtMoBulkModal = function(action) {
        nqtBulkActionType = action;
        document.getElementById('nqtBulkCount').textContent = nqtDaChon.length;
        
        if (action === 'delete') {
            document.getElementById('nqtBulkTitle').textContent = `Xoá gói tập`;
            document.getElementById('nqtBulkMessage').textContent = `Dữ liệu sẽ bị ẩn hoặc xoá vĩnh viễn tùy vào lịch sử sử dụng.`;
            document.getElementById('nqtBulkConfirmBtn').className = "inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#dc2626] text-white text-sm font-medium rounded-md hover:bg-[#b91c1c]";
        } else {
            const nqtLabels = { true: 'Hoạt động', false: 'Tạm ẩn' };
            document.getElementById('nqtBulkTitle').textContent = `Cập nhật sang ${nqtLabels[action]}`;
            document.getElementById('nqtBulkMessage').textContent = `Gói tập sẽ được cập nhật trạng thái.`;
            document.getElementById('nqtBulkConfirmBtn').className = "inline-flex items-center justify-center gap-2 px-4 py-2 bg-[#191919] dark:bg-[#fafafa] text-white dark:text-[#191919] text-sm font-medium rounded-md hover:bg-[#404040] dark:hover:bg-[#e5e5e5]";
        }
        nqtMoModal('modalBulkAction');
    }

    window.nqtXacNhanBulkAction = async function() {
        if (nqtDaChon.length === 0) return;
        const btn = document.getElementById('nqtBulkConfirmBtn');
        const nqtRestoreBulk = nqtBtnLoading(btn, 'Đang xử lý...');

        let nqtThanhCong = 0, nqtThatBai = 0;
        for (const id of nqtDaChon) {
            let res;
            if (nqtBulkActionType === 'delete') {
                res = await nqtApi.fetch(`/api/nqt-goi-tap/${id}`, { method: 'DELETE' });
            } else {
                res = await nqtApi.fetch(`/api/nqt-goi-tap/${id}`, { method: 'PUT', body: { g6_la_hoat_dong: nqtBulkActionType } });
            }
            if (res && res.nqt_thanh_cong) nqtThanhCong++;
            else nqtThatBai++;
        }

        nqtRestoreBulk();
        nqtDongModal('modalBulkAction');
        nqtBoChonTatCa();
        nqtLoadPackages();

        if (nqtThatBai === 0) nqtToast(`Đã xử lý ${nqtThanhCong} gói tập!`, 'success');
        else nqtToast(`Thành công: ${nqtThanhCong}, Thất bại: ${nqtThatBai}`, 'warn');
    }

    async function nqtLoadBranches() {
        const data = await nqtApi.fetch('/api/nqt-chi-nhanh');
        if (data?.nqt_thanh_cong) {
            document.getElementById('selectBranchAddPkg').innerHTML = data.nqt_du_lieu.map(b => `<option value="${b.g6_ma_chi_nhanh}">${b.g6_ten_chi_nhanh}</option>`).join('');
        }
    }

    window.nqtLoadPackages = async function() {
        const grid = document.getElementById('packageGrid');
        grid.innerHTML = '<div class="col-span-full py-12 text-center text-[#666] dark:text-[#888]">Đang tải...</div>';

        const trangThai = document.getElementById('nqtLocTrangThai')?.value || 'hoat_dong';
        const data = await nqtApi.fetch(`/api/nqt-goi-tap?g6_trang_thai=${trangThai}`);
        if (!data?.nqt_thanh_cong) return;

        nqtAllPackages = data.nqt_du_lieu;
        if (nqtAllPackages.length === 0) { grid.innerHTML = '<div class="col-span-full py-12 text-center text-[#666] dark:text-[#888]">Chưa có gói tập nào</div>'; return; }

        const nqtFmt = n => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
        grid.innerHTML = nqtAllPackages.map(g => {
            const isHidden = !g.g6_la_hoat_dong;
            const isChecked = nqtDaChon.includes(g.g6_ma_goi_tap);
            const borderCls = isChecked ? 'ring-2 ring-[#191919] dark:ring-[#fafafa]' : 'border border-[#e5e5e5] dark:border-[#404040]';
            return `
            <div data-row-id="${g.g6_ma_goi_tap}" class="cursor-pointer transition-all bg-white dark:bg-[#262626] rounded-md p-4 ${borderCls} ${g.g6_la_noi_bat ? 'border-l-4 border-l-[#f59e0b]' : ''} ${isHidden ? 'opacity-60' : ''} hover:shadow-md" onclick="nqtToggleRow(${g.g6_ma_goi_tap}, event)">
                <div class="flex items-start justify-between mb-3">
                    <div>
                        <h3 class="font-semibold text-[#191919] dark:text-[#fafafa]">${g.g6_ten_goi}</h3>
                        <p class="text-xs text-[#666] dark:text-[#888]">${g.g6_so_ngay} ngày</p>
                    </div>
                    <div class="flex flex-col gap-1 items-end">
                        ${g.g6_la_noi_bat ? '<span class="text-[10px] font-medium px-1.5 py-0.5 bg-[#fef3c7] text-[#92400e] rounded-md">Nổi bật</span>' : ''}
                        ${isHidden ? '<span class="text-[10px] font-medium px-1.5 py-0.5 bg-[#fef2f2] text-[#dc2626] dark:bg-[#451a1a] rounded-md">Đã ẩn</span>' : ''}
                    </div>
                </div>
                <div class="space-y-1 mb-4 text-sm text-[#666] dark:text-[#888]">
                    <p><i class="fas fa-check text-[#16a34a] mr-1.5 text-xs"></i>${g.g6_co_pt ? 'Gồm PT' : 'Tập tự do'}</p>
                </div>
                <div class="flex items-center justify-between pt-3 border-t border-[#e5e5e5] dark:border-[#404040]">
                    <span class="text-lg font-semibold text-[#191919] dark:text-[#fafafa]">${nqtFmt(g.g6_gia)}</span>
                    <div class="flex space-x-1">
                        <button onclick="nqtSuaGoiTap(${g.g6_ma_goi_tap})" class="inline-flex items-center justify-center w-8 h-8 rounded-md text-sm text-[#666] hover:text-[#191919] dark:hover:text-[#fafafa] hover:bg-[#f5f5f5] dark:hover:bg-[#333] transition-colors"><i class="fas fa-edit"></i></button>
                        ${isHidden ? '' : `<button onclick="nqtXoaGoiTap(${g.g6_ma_goi_tap}, '${g.g6_ten_goi.replace(/'/g, "\\'")}')" class="inline-flex items-center justify-center w-8 h-8 rounded-md text-sm text-[#666] hover:text-[#dc2626] hover:bg-[#fef2f2] dark:hover:bg-[#451a1a] transition-colors"><i class="fas fa-eye-slash"></i></button>`}
                    </div>
                </div>
            </div>
            `;
        }).join('');
    };


    document.getElementById('formAddPackage').onsubmit = async e => {
        e.preventDefault();
        const nqtBtn = e.target.querySelector('[type="submit"]');
        const nqtRestore = nqtBtnLoading(nqtBtn, 'Đang lưu...');
        const fd = new FormData(e.target), data = Object.fromEntries(fd);
        data.g6_gia = parseFloat(data.g6_gia);
        data.g6_so_ngay = parseInt(data.g6_so_ngay);
        data.g6_ma_chi_nhanh = parseInt(data.g6_ma_chi_nhanh);
        data.g6_co_pt = e.target.g6_co_pt.checked;

        const res = await nqtApi.fetch('/api/nqt-goi-tap', { method: 'POST', body: data });
        nqtRestore();
        if (res?.nqt_thanh_cong) { nqtDongModal('modalAddPackage'); e.target.reset(); nqtLoadPackages(); nqtToast('Tạo thành công!', 'success'); }
        else nqtToast(res?.nqt_thong_diep || 'Lỗi', 'error');
    };

    window.nqtSuaGoiTap = id => {
        const g = nqtAllPackages.find(p => p.g6_ma_goi_tap === id);
        if (!g) return;
        const form = document.getElementById('formEditPackage');
        form.g6_ma_goi_tap.value = g.g6_ma_goi_tap;
        form.g6_ten_goi.value = g.g6_ten_goi;
        form.g6_gia.value = g.g6_gia;
        form.g6_gia_khuyen_mai.value = g.g6_gia_khuyen_mai || '';
        form.g6_la_hoat_dong.value = g.g6_la_hoat_dong.toString();
        form.g6_la_noi_bat.value = g.g6_la_noi_bat.toString();
        nqtMoModal('modalEditPackage');
    };

    document.getElementById('formEditPackage').onsubmit = async e => {
        e.preventDefault();
        const nqtBtn = e.target.querySelector('[type="submit"]');
        const nqtRestore = nqtBtnLoading(nqtBtn, 'Đang lưu...');
        const fd = new FormData(e.target), id = fd.get('g6_ma_goi_tap');
        const data = { g6_ten_goi: fd.get('g6_ten_goi'), g6_gia: parseFloat(fd.get('g6_gia')), g6_gia_khuyen_mai: fd.get('g6_gia_khuyen_mai') ? parseFloat(fd.get('g6_gia_khuyen_mai')) : null, g6_la_hoat_dong: fd.get('g6_la_hoat_dong') === 'true', g6_la_noi_bat: fd.get('g6_la_noi_bat') === 'true' };
        const res = await nqtApi.fetch(`/api/nqt-goi-tap/${id}`, { method: 'PUT', body: data });
        nqtRestore();
        if (res?.nqt_thanh_cong) { nqtDongModal('modalEditPackage'); nqtLoadPackages(); nqtToast('Cập nhật thành công!', 'success'); }
        else nqtToast(res?.nqt_thong_diep || 'Lỗi', 'error');
    };

    window.nqtXoaGoiTap = (id, name) => { nqtDeletePkgTargetId = id; document.getElementById('deletePkgTargetName').textContent = name; nqtMoModal('modalConfirmDeletePkg'); };
    window.nqtXacNhanXoaGoiTap = async () => {
        if (!nqtDeletePkgTargetId) return;
        const res = await nqtApi.fetch(`/api/nqt-goi-tap/${nqtDeletePkgTargetId}`, { method: 'DELETE' });
        nqtDongModal('modalConfirmDeletePkg');
        if (res?.nqt_thanh_cong) { nqtLoadPackages(); nqtToast('Đã ẩn gói tập!', 'success'); } else nqtToast(res?.nqt_thong_diep || 'Lỗi', 'error');
        nqtDeletePkgTargetId = null;
    };

    nqtLoadBranches(); nqtLoadPackages();
})();
</script>
</body>
</html>
